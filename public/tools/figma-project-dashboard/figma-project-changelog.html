<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Project Changelog</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --surface: #111111;
    --surface-raised: #1A1A1A;
    --border: #222222;
    --border-visible: #333333;
    --text-display: #FFFFFF;
    --text-primary: #E8E8E8;
    --text-secondary: #999999;
    --text-disabled: #666666;
    --accent: #D71921;
    --accent-subtle: rgba(215,25,33,0.15);
    --interactive: #5B9BF6;
    --interactive-subtle: rgba(91,155,246,0.12);
    --success: #4ade80;
    --success-subtle: rgba(74,222,128,0.12);
    --dot-opacity: 0.4;
  }

  :root[data-theme="light"] {
    --black: #F5F5F5;
    --surface: #FFFFFF;
    --surface-raised: #F0F0F0;
    --border: #E5E5E5;
    --border-visible: #D0D0D0;
    --text-display: #111111;
    --text-primary: #222222;
    --text-secondary: #777777;
    --text-disabled: #AAAAAA;
    --accent: #D71921;
    --accent-subtle: rgba(215,25,33,0.08);
    --interactive: #2B6FD0;
    --interactive-subtle: rgba(43,111,208,0.08);
    --success: #16A34A;
    --success-subtle: rgba(22,163,74,0.08);
    --dot-opacity: 0.25;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--black);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* dot-matrix bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, var(--border) 0.5px, transparent 0.5px);
    background-size: 24px 24px;
    opacity: var(--dot-opacity);
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 32px 24px; }

  body[data-embedded="true"]::before { display: none; }
  body[data-embedded="true"] .page {
    max-width: none;
    min-height: 100vh;
    padding: 0;
  }
  body[data-embedded="true"] .header,
  body[data-embedded="true"] .view-tabs {
    display: none;
  }
  body[data-embedded="true"] .map-view {
    min-height: 100vh;
  }
  body[data-embedded="true"] .map-view .page-map-dialog {
    height: 100vh;
    min-height: 0;
    border: 0;
    border-radius: 0;
  }
  body[data-embedded="true"] .status-bar {
    display: none !important;
  }
  body[data-embedded="true"] .source-section {
    margin-bottom: 16px;
    border-width: 0 0 1px;
    border-radius: 0;
  }
  body[data-embedded="true"] #changelogView {
    min-height: 100vh;
    padding: 16px;
  }
  .embedded-actions {
    display: none;
  }
  body[data-embedded="true"] .embedded-actions {
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    min-width: 0;
    margin-left: auto;
  }
  body[data-embedded="true"] .embedded-meta {
    overflow: hidden;
    max-width: min(58vw, 720px);
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  body[data-embedded="true"] .map-view .page-map-dialog > .file-dialog-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    min-height: 40px;
    padding: 6px 16px;
    gap: 8px;
  }
  body[data-embedded="true"] .map-view .page-map-dialog > .file-dialog-header h2 {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }
  body[data-embedded="true"] .map-view .page-map-dialog > .file-dialog-header .embedded-actions {
    grid-column: 1;
    justify-self: end;
    overflow: hidden;
  }
  body[data-embedded="true"] .map-view .page-map-dialog > .file-dialog-header .embedded-meta {
    max-width: min(42vw, 560px);
  }
  body[data-embedded="true"] .map-view .page-map-dialog > .file-dialog-header > div:last-child {
    grid-column: 2;
    min-width: max-content;
  }
  body[data-embedded="true"] .source-section .embedded-actions {
    flex-wrap: wrap;
  }
  body[data-embedded="true"] .page-map-access-chip.primary,
  body[data-embedded="true"] .page-map-user-chip.primary {
    color: var(--interactive);
    border-color: var(--interactive);
    background: var(--interactive-subtle);
  }
  body[data-embedded="true"] .page-map-user-chip {
    color: var(--text-primary);
    border-color: var(--border-visible);
    background: var(--surface-raised);
  }
  body[data-embedded="true"] .page-map-user-chip.muted {
    color: var(--text-secondary);
    border-color: var(--border-visible);
    background: var(--surface);
  }
  body[data-embedded="true"] {
    --platform-ui-font: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    --platform-code-font: var(--platform-ui-font);
    --platform-ui-size: 14px;
    --platform-code-size: 14px;
    --platform-stroke: 0.5px;
    --platform-radius-tiny: 2px;
    --platform-radius: 4px;
    --platform-radius-large: 13px;
    --platform-radius-full: 9999px;
    --platform-control-height: 24px;
    --platform-control-height-large: 32px;
    --platform-surface-soft: color-mix(in srgb, var(--surface) 70%, var(--black));
    --platform-nav-active-bg: var(--interactive-subtle);
    --platform-border-soft: color-mix(in srgb, var(--border) 74%, transparent);
    --platform-danger-border: color-mix(in srgb, var(--accent) 46%, transparent);
    --platform-success-border: color-mix(in srgb, var(--success) 46%, transparent);
    font-family: var(--platform-ui-font);
    font-size: var(--platform-ui-size);
    line-height: 1.45;
    background: var(--black);
    color: var(--text-primary);
  }
  body[data-embedded="true"],
  body[data-embedded="true"] button,
  body[data-embedded="true"] input,
  body[data-embedded="true"] select,
  body[data-embedded="true"] textarea {
    font-family: var(--platform-ui-font) !important;
    letter-spacing: 0;
  }
  body[data-embedded="true"] button,
  body[data-embedded="true"] a {
    color: inherit;
  }
  body[data-embedded="true"] .page,
  body[data-embedded="true"] #mapView,
  body[data-embedded="true"] #changelogView,
  body[data-embedded="true"] .map-view,
  body[data-embedded="true"] .page-map-content {
    background: var(--black);
    color: var(--text-primary);
  }
  body[data-embedded="true"] #changelogView {
    padding: 12px;
  }
  body[data-embedded="true"] section {
    margin-bottom: 12px;
  }
  body[data-embedded="true"] .section-label,
  body[data-embedded="true"] .filter-group-label,
  body[data-embedded="true"] .day-header,
  body[data-embedded="true"] .page-analysis-status,
  body[data-embedded="true"] .page-map-count,
  body[data-embedded="true"] .page-map-node,
  body[data-embedded="true"] .page-map-user-label,
  body[data-embedded="true"] .fv-pages-label,
  body[data-embedded="true"] .file-current-page-count,
  body[data-embedded="true"] .file-current-page-empty,
  body[data-embedded="true"] .dialog-field label,
  body[data-embedded="true"] .dialog-status,
  body[data-embedded="true"] .header-meta,
  body[data-embedded="true"] .version-time,
  body[data-embedded="true"] .version-meta,
  body[data-embedded="true"] .fv-time,
  body[data-embedded="true"] .stat-label,
  body[data-embedded="true"] .stat-sub,
  body[data-embedded="true"] .user-detail-name,
  body[data-embedded="true"] .user-detail-meta {
    font-family: var(--platform-code-font) !important;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0;
    line-height: 1.45;
    color: var(--text-disabled);
  }
  body[data-embedded="true"] .section-label,
  body[data-embedded="true"] .filter-group-label,
  body[data-embedded="true"] .day-header,
  body[data-embedded="true"] .dialog-field label,
  body[data-embedded="true"] .file-current-page-empty {
    font-variant-caps: all-small-caps;
    text-transform: uppercase;
  }
  body[data-embedded="true"] .dialog-title,
  body[data-embedded="true"] .page-map-project-head h3 {
    font-family: var(--platform-ui-font) !important;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: 0;
    color: var(--text-display);
  }
  body[data-embedded="true"] .file-dialog-header h2,
  body[data-embedded="true"] .stat-value {
    font-family: var(--platform-ui-font) !important;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0;
    color: var(--text-display);
  }
  body[data-embedded="true"] .page-map-file-head h4,
  body[data-embedded="true"] .page-map-page a,
  body[data-embedded="true"] .page-map-nav-project,
  body[data-embedded="true"] .version-file,
  body[data-embedded="true"] .version-label-text,
  body[data-embedded="true"] .fv-user,
  body[data-embedded="true"] .fv-label,
  body[data-embedded="true"] .file-current-page-name,
  body[data-embedded="true"] .dialog-hint {
    font-family: var(--platform-ui-font) !important;
    font-size: var(--platform-ui-size);
    font-weight: 400;
    line-height: 1.45;
    letter-spacing: 0;
    color: var(--text-primary);
  }
  body[data-embedded="true"] .page-map-nav-file,
  body[data-embedded="true"] .empty-sub,
  body[data-embedded="true"] .file-current-page-url,
  body[data-embedded="true"] .page-map-empty,
  body[data-embedded="true"] .page-map-warning {
    font-family: var(--platform-ui-font) !important;
    font-size: 13px;
    letter-spacing: 0;
    line-height: 1.5;
    color: var(--text-secondary);
  }
  body[data-embedded="true"] .pill,
  body[data-embedded="true"] .project-tag,
  body[data-embedded="true"] .file-link,
  body[data-embedded="true"] .token-status,
  body[data-embedded="true"] .badge,
  body[data-embedded="true"] .day-count,
  body[data-embedded="true"] .page-chip,
  body[data-embedded="true"] .page-map-access-chip,
  body[data-embedded="true"] .page-map-user-chip,
  body[data-embedded="true"] .btn-add-circle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: var(--platform-control-height);
    padding: 0 10px;
    border: var(--platform-stroke) solid var(--border-visible);
    border-radius: var(--platform-radius);
    background: var(--surface-raised);
    color: var(--text-secondary);
    font-family: var(--platform-code-font) !important;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0;
    line-height: 1;
    text-transform: uppercase;
    font-variant-caps: all-small-caps;
    text-decoration: none;
    white-space: nowrap;
  }
  body[data-embedded="true"] .pill,
  body[data-embedded="true"] .project-tag {
    height: var(--platform-control-height);
    gap: 6px;
  }
  body[data-embedded="true"] .project-tag,
  body[data-embedded="true"] .page-chip,
  body[data-embedded="true"] .page-map-user-chip {
    text-transform: none;
    font-variant-caps: normal;
  }
  body[data-embedded="true"] .page-map-access-chip,
  body[data-embedded="true"] .page-map-user-chip {
    max-width: 100%;
    overflow: visible;
    text-overflow: clip;
    white-space: normal;
    overflow-wrap: anywhere;
    line-height: 1.35;
  }
  body[data-embedded="true"] .pill:hover,
  body[data-embedded="true"] .project-tag:hover,
  body[data-embedded="true"] .file-link:hover,
  body[data-embedded="true"] .page-map-nav button:hover {
    color: var(--text-primary);
    border-color: var(--interactive);
    background: var(--interactive-subtle);
  }
  body[data-embedded="true"] .pill.active,
  body[data-embedded="true"] .project-tag.active,
  body[data-embedded="true"] .page-map-nav-project.active {
    color: var(--interactive);
    border-color: var(--interactive);
    background: var(--platform-nav-active-bg);
  }
  body[data-embedded="true"] .pill.interactive,
  body[data-embedded="true"] .file-link {
    color: var(--interactive);
    border-color: var(--interactive);
    background: transparent;
  }
  body[data-embedded="true"] .pill.interactive:hover,
  body[data-embedded="true"] .file-link:hover {
    color: var(--interactive);
    background: var(--interactive-subtle);
  }
  body[data-embedded="true"] .pill:disabled {
    opacity: 0.48;
  }
  body[data-embedded="true"] .token-status.ok,
  body[data-embedded="true"] .badge-named,
  body[data-embedded="true"] .page-chip.added {
    color: var(--success);
    border-color: var(--platform-success-border);
    background: var(--success-subtle);
  }
  body[data-embedded="true"] .token-status.missing,
  body[data-embedded="true"] .page-chip.removed,
  body[data-embedded="true"] .page-map-access-chip.warn,
  body[data-embedded="true"] .dialog-status.err,
  body[data-embedded="true"] .page-map-warning {
    color: var(--accent);
    border-color: var(--platform-danger-border);
    background: var(--accent-subtle);
  }
  body[data-embedded="true"] .badge-duration,
  body[data-embedded="true"] .page-chip.changed,
  body[data-embedded="true"] .page-map-access-chip.primary,
  body[data-embedded="true"] .page-map-user-chip.primary {
    color: var(--interactive);
    border-color: var(--interactive);
    background: var(--interactive-subtle);
  }
  body[data-embedded="true"] .page-chip.muted,
  body[data-embedded="true"] .page-map-user-chip.muted {
    color: var(--text-secondary);
    border-color: var(--border-visible);
    background: var(--surface);
  }
  body[data-embedded="true"] .source-section,
  body[data-embedded="true"] .stat-card,
  body[data-embedded="true"] .version-card,
  body[data-embedded="true"] .file-dialog,
  body[data-embedded="true"] .dialog,
  body[data-embedded="true"] .file-current-pages,
  body[data-embedded="true"] .page-map-page,
  body[data-embedded="true"] .state-card {
    border: var(--platform-stroke) solid var(--border);
    border-radius: var(--platform-radius);
    background: var(--surface);
  }
  body[data-embedded="true"] .source-section {
    margin-bottom: 12px;
    padding: 12px;
    border-width: 0 0 var(--platform-stroke);
    border-radius: 0;
    background: var(--black);
  }
  body[data-embedded="true"] .changelog-toolbar {
    align-items: center;
    gap: 12px;
  }
  body[data-embedded="true"] .controls,
  body[data-embedded="true"] .filter-row,
  body[data-embedded="true"] .project-list {
    gap: 6px;
  }
  body[data-embedded="true"] .controls-separator,
  body[data-embedded="true"] .filter-divider {
    width: var(--platform-stroke);
    background: var(--border);
  }
  body[data-embedded="true"] input,
  body[data-embedded="true"] .page-map-search,
  body[data-embedded="true"] .dialog-field input,
  body[data-embedded="true"] .settings-add-project input,
  body[data-embedded="true"] .add-inline input {
    height: var(--platform-control-height-large);
    padding: 0 10px;
    border: var(--platform-stroke) solid var(--border-visible);
    border-radius: var(--platform-radius);
    background: var(--surface-raised);
    color: var(--text-primary);
    font-family: var(--platform-code-font) !important;
    font-size: var(--platform-code-size);
    letter-spacing: 0;
    outline: none;
  }
  body[data-embedded="true"] input:focus,
  body[data-embedded="true"] .page-map-search:focus,
  body[data-embedded="true"] .dialog-field input:focus,
  body[data-embedded="true"] .settings-add-project input:focus,
  body[data-embedded="true"] .add-inline input:focus {
    border-color: var(--interactive);
    box-shadow: 0 0 0 2px var(--interactive-subtle);
  }
  body[data-embedded="true"] input::placeholder,
  body[data-embedded="true"] .page-map-search::placeholder,
  body[data-embedded="true"] .dialog-field input::placeholder,
  body[data-embedded="true"] .add-inline input::placeholder {
    color: var(--text-disabled);
    font-size: 11px;
    letter-spacing: 0;
    text-transform: uppercase;
  }
  body[data-embedded="true"] .token-secret-input {
    -webkit-text-security: disc;
    text-security: disc;
  }
  body[data-embedded="true"] .page-map-body {
    grid-template-columns: var(--page-map-nav-width, 300px) 4px minmax(0, 1fr);
    background: var(--black);
  }
  body[data-embedded="true"] .page-map-nav {
    padding: 12px;
    background: var(--surface);
    border-right: var(--platform-stroke) solid var(--border);
  }
  body[data-embedded="true"] .page-map-resizer {
    width: 4px;
    min-width: 4px;
    background: var(--black);
    border-left: 0;
    border-right: var(--platform-stroke) solid var(--border);
  }
  body[data-embedded="true"] .page-map-resizer::before {
    top: 12px;
    bottom: 12px;
    width: var(--platform-stroke);
    background: var(--border-visible);
  }
  body[data-embedded="true"] .page-map-content {
    padding: 12px 16px 16px;
    font-size: var(--platform-ui-size);
  }
  body[data-embedded="true"] .file-versions-toolbar {
    align-items: center;
    margin-bottom: 10px;
  }
  body[data-embedded="true"] .page-map-search-wrap {
    margin-bottom: 12px;
  }
  body[data-embedded="true"] .page-map-search-clear {
    right: 4px;
    width: var(--platform-control-height);
    height: var(--platform-control-height);
    border: var(--platform-stroke) solid transparent;
    border-radius: var(--platform-radius);
    color: var(--text-secondary);
  }
  body[data-embedded="true"] .page-map-search-clear::before,
  body[data-embedded="true"] .page-map-search-clear::after {
    width: 10px;
    height: 1.5px;

  body[data-embedded="true"] .page-map-search-clear:hover,
  body[data-embedded="true"] .page-map-search-clear:focus-visible {
    color: var(--interactive);
    border-color: var(--interactive);
    background: var(--interactive-subtle);
  }
  body[data-embedded="true"] .page-map-nav button {
    min-height: var(--platform-control-height);
    padding: 0 8px;
    border: var(--platform-stroke) solid transparent;
    border-radius: var(--platform-radius);
    background: transparent;
    color: var(--text-secondary);
    text-transform: none;
  }
  body[data-embedded="true"] .page-map-nav-project {
    margin-top: 4px;
  }
  body[data-embedded="true"] .page-map-nav-file {
    padding-left: 18px;
  }
  body[data-embedded="true"] .page-map-count {
    margin-left: 6px;
    color: var(--text-disabled);
  }
  body[data-embedded="true"] .page-map-project {
    margin-bottom: 16px;

  }
  body[data-embedded="true"] .page-map-file {
    margin-top: 12px;
    padding-top: 12px;
    border-top: var(--platform-stroke) solid var(--border);
  }
  body[data-embedded="true"] .page-map-page-list {
    gap: 4px;
    margin-top: 8px;
  }
  body[data-embedded="true"] .page-map-page {
    min-height: var(--platform-control-height-large);
    padding: 6px 8px;
    background: var(--surface-raised);
  }
  body[data-embedded="true"] .page-map-page a,
  body[data-embedded="true"] .file-current-page-open,
  body[data-embedded="true"] .file-current-page-url:hover {

  body[data-embedded="true"] .page-map-users,
  body[data-embedded="true"] .page-map-access,
  body[data-embedded="true"] .fv-pages {
    gap: 4px;
    margin-top: 6px;
    font-family: var(--platform-ui-font) !important;
    font-size: var(--platform-ui-size);
    letter-spacing: 0;
    color: var(--text-secondary);
  }
  body[data-embedded="true"] .page-map-user-label,
  body[data-embedded="true"] .fv-pages-label {
    display: inline-flex;
    align-items: center;
    min-height: var(--platform-control-height);
    margin-right: 2px;
  }
  body[data-embedded="true"] .page-map-empty,
  body[data-embedded="true"] .page-map-warning {

  }

    padding: 24px;

  }
  body[data-embedded="true"] .figma-token-empty-copy {

    gap: 14px;

  body[data-embedded="true"] .figma-token-empty-copy h3 {

    color: var(--text-display);

    margin-top: 2px;
  }
  body[data-embedded="true"] .page-map-warning {
    padding: 8px 10px;
    border: var(--platform-stroke) solid var(--platform-danger-border);
    border-radius: var(--platform-radius);
  }
  body[data-embedded="true"] .stats-row {
    gap: 8px;
  }
  body[data-embedded="true"] .stat-card {
    padding: 12px;
  }
  body[data-embedded="true"] .stat-value {
    font-variant-numeric: tabular-nums;
  }
  body[data-embedded="true"] .version-card {
    padding: 10px 12px;
    margin-bottom: 6px;
    gap: 10px;
  }
  body[data-embedded="true"] .version-card:hover,
  body[data-embedded="true"] .stat-card:hover {
    border-color: var(--interactive);
  }
  body[data-embedded="true"] .version-dot,
  body[data-embedded="true"] .fv-dot {
    width: 6px;
    height: 6px;
    margin-top: 7px;
  }
  body[data-embedded="true"] .version-dot.named,
  body[data-embedded="true"] .fv-dot.named {
    background: var(--success);
  }
  body[data-embedded="true"] .version-dot.auto,
  body[data-embedded="true"] .fv-dot.auto {
    background: var(--border-visible);
  }
  body[data-embedded="true"] .version-label-text,
  body[data-embedded="true"] .fv-label {
    color: var(--text-secondary);
  }
  body[data-embedded="true"] .version-label-text.is-named,
  body[data-embedded="true"] .dialog-status.ok {
    color: var(--success);
  }
  body[data-embedded="true"] .version-avatar,
  body[data-embedded="true"] .avatar-stack img {
    border: var(--platform-stroke) solid var(--border-visible);
  }
  body[data-embedded="true"] .file-dialog {
    border-color: var(--border-visible);
    border-radius: var(--platform-radius);
    background: var(--surface);
  }
  body[data-embedded="true"] .file-dialog-header,
  body[data-embedded="true"] .file-current-pages,
  body[data-embedded="true"] .fv-item,
  body[data-embedded="true"] .file-current-page,
  body[data-embedded="true"] .user-detail-header,
  body[data-embedded="true"] .settings-projects {
    border-color: var(--border);
    border-width: var(--platform-stroke);
  }
  body[data-embedded="true"] .file-embed-wrap {
    background: var(--surface-raised);
    border-bottom: var(--platform-stroke) solid var(--border);
  }
  body[data-embedded="true"] .file-versions-list,
  body[data-embedded="true"] .file-current-pages {
    padding: 12px 16px;
  }
  body[data-embedded="true"] .page-chip {
    max-width: 100%;
    white-space: normal;
    line-height: 1.35;
  }
  body[data-embedded="true"] .dialog-backdrop {
    background: rgba(0, 0, 0, 0.34);
    backdrop-filter: blur(10px);
  }
  body[data-embedded="true"] .dialog {
    padding: 16px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  }
  body[data-embedded="true"] .dialog-title {
    margin-bottom: 16px;
  }
  body[data-embedded="true"] .dialog-close {
    top: 12px;
    right: 12px;
    width: var(--platform-control-height);
    height: var(--platform-control-height);
    border: var(--platform-stroke) solid var(--border);
    border-radius: var(--platform-radius);
    background: var(--surface-raised);
    color: var(--text-secondary);
    font-size: 14px;
  }
  body[data-embedded="true"] .dialog-field {
    margin-bottom: 12px;
  }
  body[data-embedded="true"] .dialog-actions {
    margin-top: 16px;
  }
  body[data-embedded="true"] .settings-add-project {
    gap: 8px;
  }
  body[data-embedded="true"] .avatar-stack {
    gap: 4px;
  }
  body[data-embedded="true"] .avatar-stack img {
    margin-left: 0;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 48px;
  }

  .header h1 {
    font-family: 'Doto', 'Space Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--text-display);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-meta {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* ── Pill Buttons ── */
  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border-visible);
    border-radius: 999px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 200ms ease-out, border-color 200ms ease-out;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .pill:hover { color: var(--text-display); border-color: var(--text-display); }
  .pill:disabled { opacity: 0.3; cursor: not-allowed; }

  .pill.active {
    color: var(--text-display);
    border-color: var(--text-display);
  }

  .pill.interactive { color: var(--interactive); border-color: var(--interactive); }
  .pill.interactive:hover { color: var(--text-display); border-color: var(--text-display); }

  .view-tabs {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: -24px 0 24px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
  }

  .view-tab {
    min-width: 112px;
    justify-content: center;
  }

  .view-panel { display: none; }
  .view-panel.active { display: block; }

  .changelog-toolbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .map-view {
    min-height: calc(100vh - 180px);
  }

  .map-view .page-map-dialog {
    width: 100%;
    max-width: none;
    height: calc(100vh - 188px);
    min-height: 620px;
    max-height: none;
  }

  /* ── Source Section ── */
  .source-section {
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }

  .source-row {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  .source-projects { flex: 1; min-width: 0; }

  .source-actions { flex-shrink: 0; }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .controls-separator {
    width: 1px;
    height: 20px;
    background: var(--border-visible);
    margin: 0 4px;
  }

  /* ── Sections ── */
  section { margin-bottom: 24px; }

  #filtersSection { margin-bottom: 20px; }
  #filtersSection .section-label { margin-bottom: 10px; }
  #filtersSection .filter-row { margin-bottom: 0; }

  .filter-group-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-bottom: 8px;
  }

  .filter-divider {
    height: 1px;
    background: var(--border-visible);
    margin: 14px 0;
  }

  .filter-group--users .filter-group-label {
    color: var(--text-secondary);
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-bottom: 12px;
  }

  .project-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .project-tag {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border-visible);
    border-radius: 999px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 200ms ease-out;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .project-tag:hover { color: var(--text-display); border-color: var(--text-display); }

  .project-tag.active {
    color: var(--interactive);
    border-color: var(--interactive);
  }

  .project-tag .tag-id {
    font-size: 10px;
    opacity: 0.5;
  }

  .project-tag .tag-remove {
    font-size: 14px;
    line-height: 1;
    opacity: 0.4;
    transition: opacity 200ms, color 200ms;
    margin-right: -4px;
  }

  .project-tag .tag-remove:hover { opacity: 1; color: var(--accent); }

  /* ── Add project inline ── */
  .add-inline {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .add-inline input {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-visible);
    color: var(--text-primary);
    padding: 4px 0;
    outline: none;
    transition: border-color 200ms;
    width: 100px;
  }

  .add-inline input:focus { border-color: var(--text-primary); }

  .add-inline input::placeholder {
    color: var(--text-disabled);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .add-inline .id-input { width: 220px; }

  .btn-add-circle {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    border: 1px solid var(--border-visible);
    background: transparent;
    color: var(--text-disabled);
    font-size: 16px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms;
    flex-shrink: 0;
  }

  .btn-add-circle:hover { color: var(--text-display); border-color: var(--text-display); }

  /* ── Settings Dialog ── */
  .dialog-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .dialog-backdrop.open { display: flex; }
  body.dialog-open { overflow: hidden; }

  .dialog {
    background: var(--surface);
    border: 1px solid var(--border-visible);
    border-radius: 16px;
    width: 480px;
    max-width: 90vw;
    padding: 24px;
    position: relative;
  }

  .settings-dialog {
    width: 760px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .settings-projects {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 22px;
  }

  .settings-projects .project-list {
    margin-bottom: 16px;
    max-height: 260px;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding-right: 2px;
  }

  .settings-add-project {
    display: grid;
    grid-template-columns: minmax(120px, 180px) minmax(220px, 1fr) auto;
    align-items: end;
    gap: 10px;
  }

  .settings-add-project input {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-visible);
    color: var(--text-primary);
    padding: 8px 0;
    outline: none;
  }

  .settings-add-project input:focus { border-color: var(--text-primary); }

  .dialog-title {
    font-family: 'Space Grotesk', system-ui;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text-display);
    margin-bottom: 24px;
  }

  .dialog-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: var(--surface-raised);
    border: none;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 200ms;
  }

  .dialog-close:hover { color: var(--text-display); }

  .dialog-field {
    margin-bottom: 20px;
  }

  .dialog-field label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-bottom: 8px;
  }

  .dialog-field input {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-visible);
    color: var(--text-primary);
    padding: 8px 0;
    outline: none;
    transition: border-color 200ms;
  }

  .dialog-field input:focus { border-color: var(--text-primary); }

  .dialog-field input::placeholder {
    color: var(--text-disabled);
  }

  .dialog-hint {
    font-size: 13px;
    color: var(--text-disabled);
    margin-top: 6px;
    line-height: 1.4;
  }

  .dialog-status {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 16px;
  }

  .dialog-status.ok { color: var(--success); }
  .dialog-status.err { color: var(--accent); }

  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 24px;
  }

  /* ── Stats ── */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 0;
  }

  #overviewSection { margin-bottom: 32px; }
  #overviewSection.dimmed { opacity: 0.42; transition: opacity 200ms ease-out; }
  #overviewSection.dimmed .stat-card { pointer-events: none; }

  #userStatsSection { margin-bottom: 32px; }

  .user-detail-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .user-detail-name {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-display);
  }

  .user-detail-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-left: auto;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    flex: 1;
    min-width: 0;
    transition: border-color 200ms;
  }

  .stat-card:hover { border-color: var(--border-visible); }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Space Grotesk', system-ui;
    font-size: 32px;
    font-weight: 700;
    color: var(--text-display);
    font-variant-numeric: tabular-nums;
  }

  .stat-sub {
    font-size: 13px;
    color: var(--text-disabled);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .avatar-stack {
    display: flex;
    align-items: center;
    margin-top: 8px;
    gap: 0;
  }

  .avatar-stack img {
    width: 22px;
    height: 22px;
    border-radius: 999px;
    border: 2px solid var(--surface);
    object-fit: cover;
    margin-left: -6px;
  }

  .avatar-stack img:first-child { margin-left: 0; }

  .avatar-stack .avatar-overflow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-disabled);
    margin-left: 6px;
  }

  /* ── Filter chips ── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* ── Timeline ── */
  .day-group { margin-bottom: 32px; }

  .day-header {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .day-count {
    font-size: 10px;
    color: var(--text-disabled);
    background: var(--surface-raised);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .version-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 200ms;
  }

  .version-card:hover { border-color: var(--border-visible); }

  .version-time {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-disabled);
    min-width: 44px;
    padding-top: 1px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  .version-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }

  .version-dot.named { background: var(--success); }
  .version-dot.auto { background: var(--border-visible); }

  .version-body { flex: 1; min-width: 0; }

  .version-file {
    font-family: 'Space Grotesk', system-ui;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .version-label-text {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .version-label-text.is-named { color: var(--success); }

  .version-meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-disabled);
    letter-spacing: 0.04em;
    align-items: center;
  }

  .version-avatar {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 1px solid var(--border-visible);
    object-fit: cover;
    flex-shrink: 0;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 8px;
    display: inline-block;
    vertical-align: middle;
  }

  .badge-named { background: var(--success-subtle); color: var(--success); }
  .badge-duration { background: var(--interactive-subtle); color: var(--interactive); }

  .file-link {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text-disabled);
    background: var(--surface-raised);
    border-radius: 999px;
    padding: 2px 8px;
    margin-left: 6px;
    transition: color 200ms, background 200ms;
    white-space: nowrap;
  }

  .file-link:hover {
    color: var(--interactive);
    background: var(--interactive-subtle);
  }

  /* ── Status / Feedback ── */
  .status-bar {
    padding: 16px 0;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-disabled);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--border-visible);
    border-top-color: var(--text-secondary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--accent-subtle);
    color: var(--accent);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(215,25,33,0.3);
    margin-bottom: 16px;
  }

  .notice-msg {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: rgba(0, 200, 140, 0.08);
    color: var(--success);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(0, 200, 140, 0.28);
    margin-bottom: 16px;
  }

  .empty-state {
    text-align: center;
    padding: 96px 24px;
    color: var(--text-disabled);
  }

  .empty-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 14px;
    color: var(--text-disabled);
  }

  .token-status {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .token-status.ok {
    background: var(--success-subtle);
    color: var(--success);
  }

  .token-status.missing {
    background: var(--accent-subtle);
    color: var(--accent);
  }

  /* ── File Detail Dialog ── */
  .file-dialog {
    background: var(--surface);
    border: 1px solid var(--border-visible);
    border-radius: 8px;
    width: 900px;
    max-width: 95vw;
    max-height: 90vh;
    padding: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .file-dialog-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }

  .file-dialog-header h2 {
    font-family: 'Space Grotesk', system-ui;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-display);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-dialog-body {
    flex: 1;
    overflow: hidden;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  .file-embed-wrap {
    width: 100%;
    height: 360px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-raised);
    flex-shrink: 0;
  }

  .file-embed-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .file-versions-list {
    padding: 16px 24px 24px;
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .file-versions-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .file-versions-toolbar .section-label { margin-bottom: 0; }

  .page-analysis-status {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    line-height: 1.4;
    color: var(--text-disabled);
    text-align: right;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .page-analysis-status.ok { color: var(--success); }
  .page-analysis-status.warn { color: var(--interactive); }
  .page-analysis-status.err { color: var(--accent); }

  .fv-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .fv-item:last-child { border-bottom: none; }

  .fv-time {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-disabled);
    min-width: 110px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    padding-top: 1px;
  }

  .fv-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .fv-dot.named { background: var(--success); }
  .fv-dot.auto { background: var(--border-visible); }

  .fv-body { flex: 1; min-width: 0; }

  .fv-user {
    font-size: 14px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .fv-label {
    font-size: 13px;
    color: var(--success);
    margin-top: 2px;
  }

  .fv-pages {
    display: flex;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .fv-pages-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-disabled);
    letter-spacing: 0.08em;
    margin-right: 2px;
  }

  .page-chip {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    border: 1px solid var(--border-visible);
    border-radius: 3px;
    padding: 2px 5px;
    max-width: 100%;
    line-height: 1.4;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  .page-link {
    color: inherit;
    text-decoration: none;
  }

  .page-link:hover {
    color: var(--text-display);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .page-link-open {
    color: var(--text-disabled);
    margin-left: 6px;
    white-space: nowrap;
  }

  .page-chip.changed { color: var(--interactive); border-color: var(--interactive-subtle); }
  .page-chip.added { color: var(--success); border-color: var(--success-subtle); }
  .page-chip.removed { color: var(--accent); border-color: var(--accent-subtle); }
  .page-chip.muted { color: var(--text-disabled); }

  .file-current-pages {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .file-current-pages-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .file-current-pages-head .section-label { margin-bottom: 0; }

  .file-current-page-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-disabled);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .file-current-page-list {
    display: grid;
    gap: 8px;
    max-height: 180px;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .file-current-page {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    align-items: start;
    padding: 8px 0;
    border-top: 1px solid var(--border);
  }

  .file-current-page:first-child { border-top: none; }

  .file-current-page-name {
    font-size: 13px;
    color: var(--text-primary);
    overflow-wrap: anywhere;
  }

  .file-current-page-url {
    display: block;
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    line-height: 1.5;
    color: var(--text-disabled);
    text-decoration: none;
    overflow-wrap: anywhere;
    word-break: break-all;
  }

  .file-current-page-url:hover {
    color: var(--interactive);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .file-current-page-open {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--interactive);
    text-decoration: none;
    white-space: nowrap;
    padding-top: 1px;
  }

  .file-current-page-empty {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-disabled);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── Page Map Dialog ── */
  .page-map-dialog {
    background: var(--surface);
    border: 1px solid var(--border-visible);
    border-radius: 8px;
    width: 1120px;
    max-width: 96vw;
    height: 86vh;
    max-height: 900px;
    padding: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .page-map-body {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: var(--page-map-nav-width, 300px) 8px minmax(0, 1fr);
  }

  .page-map-nav {
    background: var(--surface-raised);
    padding: 16px;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .page-map-resizer {
    position: relative;
    width: 8px;
    min-width: 8px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    cursor: col-resize;
    outline: none;
  }

  .page-map-resizer::before {
    content: '';
    position: absolute;
    top: 18px;
    bottom: 18px;
    left: 50%;
    width: 1px;
    transform: translateX(-50%);
    background: var(--border-visible);
    transition: background 160ms, width 160ms;
  }

  .page-map-resizer:hover::before,
  .page-map-resizer:focus-visible::before,
  body.page-map-nav-resizing .page-map-resizer::before {
    width: 2px;
    background: var(--interactive);
  }

  body.page-map-nav-resizing {
    cursor: col-resize;
    user-select: none;
  }

  .page-map-search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .page-map-search {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    background: var(--black);
    border: 1px solid var(--border-visible);
    border-radius: 4px;
    color: var(--text-primary);
    padding: 8px 36px 8px 10px;
    outline: none;
  }

  .page-map-search::-webkit-search-cancel-button {
    -webkit-appearance: none;
    appearance: none;
    display: none;
  }

  .page-map-search::-ms-clear {
    display: none;
  }

  .page-map-search:focus {
    border-color: var(--interactive);
  }

  .page-map-search::placeholder {
    color: var(--text-disabled);
    text-transform: uppercase;
  }

  .token-secret-input {
    -webkit-text-security: disc;
    text-security: disc;
  }

  .page-map-search-clear {
    position: absolute;
    top: 50%;
    right: 5px;
    display: inline-grid;
    place-items: center;
    width: 24px;
    height: 24px;
    padding: 0;
    transform: translateY(-50%);
    border: 1px solid transparent;
    border-radius: 4px;
    background: transparent;
    color: var(--text-disabled);
    cursor: pointer;
  }

  .page-map-search-clear[hidden] {
    display: none !important;
  }

  .page-map-search-clear::before,
  .page-map-search-clear::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 1.5px;
    border-radius: 999px;
    background: currentColor;
  }

  .page-map-search-clear::before { transform: rotate(45deg); }
  .page-map-search-clear::after { transform: rotate(-45deg); }

  .page-map-search-clear:hover,
  .page-map-search-clear:focus-visible {
    color: var(--interactive);
    background: var(--interactive-subtle);
    outline: none;
  }

  .page-map-content {
    min-width: 0;
    padding: 16px 24px 24px;
    overflow-y: auto;
    overscroll-behavior: contain;
    scroll-behavior: smooth;
    font-size: 13px;
  }

  .page-map-nav button {
    width: 100%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    text-align: left;
    cursor: pointer;
    border-radius: 4px;
    transition: color 180ms, background 180ms;
  }

  .page-map-nav button:hover {
    color: var(--text-display);
    background: var(--interactive-subtle);
  }

  .page-map-nav-project {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 8px;
    margin-top: 6px;
  }

  .page-map-nav-project.active {
    color: var(--interactive);
    background: var(--interactive-subtle);
  }

  .page-map-nav-file {
    font-family: 'Space Grotesk', system-ui;
    font-size: 14px;
    padding: 6px 8px 6px 18px;
  }

  .page-map-count {
    color: var(--text-disabled);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    margin-left: 6px;
  }

  .page-map-project {
    padding-bottom: 22px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }

  .page-map-project:last-child { border-bottom: none; }

  .page-map-project-head,
  .page-map-file-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .page-map-project-head h3 {
    font-size: 19px;
    font-weight: 500;
    color: var(--text-display);
  }

  .page-map-file {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .page-map-file-head h4 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    overflow-wrap: anywhere;
  }

  .page-map-page-list {
    display: grid;
    gap: 5px;
    margin-top: 9px;
  }

  .page-map-page {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: start;
    padding: 7px 9px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--black);
  }

  .page-map-page-main {
    min-width: 0;
  }

  .page-map-page a {
    color: var(--interactive);
    text-decoration: none;
    overflow-wrap: anywhere;
    font-size: 13px;
  }

  .page-map-page a:hover {
    color: var(--text-display);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .page-map-node {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-disabled);
    white-space: nowrap;
  }

  .page-map-users {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-disabled);
    letter-spacing: 0.04em;
  }

  .page-map-access {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-disabled);
    letter-spacing: 0.04em;
  }

  .page-map-access-chip {
    color: var(--text-secondary);
    border: 1px solid var(--border-visible);
    border-radius: 4px;
    padding: 2px 6px;
    background: var(--black);
    max-width: 100%;
    overflow: visible;
    text-overflow: clip;
    white-space: normal;
    overflow-wrap: anywhere;
    line-height: 1.35;
  }

  .page-map-access-chip.primary {
    color: var(--interactive);
    border-color: var(--interactive-subtle);
  }

  .page-map-access-chip.warn {
    color: var(--accent);
    border-color: var(--accent-subtle);
  }

  .page-map-user-label {
    color: var(--text-disabled);
    margin-right: 2px;
  }

  .page-map-user-chip {
    color: var(--text-secondary);
    border: 1px solid var(--border-visible);
    border-radius: 999px;
    padding: 1px 6px;
    background: var(--surface);
    max-width: 100%;
    overflow: visible;
    text-overflow: clip;
    white-space: normal;
    overflow-wrap: anywhere;
    line-height: 1.35;
  }

  .page-map-user-chip.primary {
    color: var(--success);
    border-color: var(--success-subtle);
  }

  .page-map-user-chip.muted {
    color: var(--text-disabled);
    border-color: var(--border);
  }

  .page-map-empty,
  .page-map-warning {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-disabled);
    letter-spacing: 0.04em;
    padding: 9px 0;
  }

  .page-map-warning { color: var(--accent); }

  .figma-token-empty-state {
    display: grid;
    place-items: center;
    min-height: min(560px, calc(100vh - 260px));
    padding: 32px 20px;
  }

  .figma-token-empty-copy {
    display: grid;
    gap: 14px;
    width: min(540px, 100%);
  }

  .figma-token-empty-copy h3 {
    margin: 0;
    color: var(--text-display);
    font-size: 20px;
    font-weight: 500;
    line-height: 1.2;
  }

  .figma-token-empty-copy p,
  .figma-token-empty-copy li {
    margin: 0;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.7;
  }

  .figma-token-empty-copy ol,
  .figma-token-empty-copy ul {
    display: grid;
    gap: 4px;
    margin: 0;
    padding-left: 20px;
  }

  .figma-token-empty-copy strong {
    color: var(--text-primary);
    font-weight: 500;
  }

  .figma-token-empty-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }

  @media (max-width: 768px) {
    .page { padding: 24px 16px; }
    .header { align-items: flex-start; gap: 16px; flex-direction: column; margin-bottom: 32px; }
    .header h1 { font-size: 32px; }
    .view-tabs { margin-top: -12px; }
    .view-tab { min-width: 0; flex: 1; }
    .stats-row { flex-direction: column; }
    .controls { gap: 6px; }
    .settings-add-project { grid-template-columns: 1fr; }
    .map-view .page-map-dialog {
      height: auto;
      min-height: calc(100vh - 190px);
    }
    .page-map-body { grid-template-columns: 1fr; }
    .page-map-nav {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 220px;
    }
    .page-map-resizer { display: none; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- ═══ Header ═══ -->
  <div class="header">
    <h1>FIGMA PROJECTS</h1>
    <div class="header-actions">
      <span class="header-meta" id="headerMeta"></span>
      <span class="token-status" id="tokenStatus"></span>
      <button class="pill" id="themeToggle" onclick="toggleTheme()">LIGHT</button>
      <button class="pill" onclick="openSettings()">SETTINGS</button>
    </div>
  </div>

  <div class="view-tabs">
    <button class="pill view-tab active" id="mapTab" onclick="switchView('map')">MAP</button>
    <button class="pill view-tab" id="changelogTab" onclick="switchView('changelog')">CHANGELOG</button>
  </div>

  <!-- ═══ Feedback ═══ -->
  <div id="statusBar" class="status-bar" style="display:none"></div>
  <div id="errorBox" style="display:none"></div>

  <div id="mapView" class="view-panel active map-view">
    <section class="page-map-dialog">
      <div class="file-dialog-header">
        <h2>Page Map</h2>
        <div class="embedded-actions">
          <span class="header-meta embedded-meta" data-header-meta></span>
          <span class="token-status" data-token-status></span>
          <button class="pill" onclick="openSettings()">SETTINGS</button>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;align-items:center;justify-content:flex-end;flex-wrap:wrap">
          <button class="pill interactive" id="pageMapRefresh" onclick="loadPageMap(true)">REFRESH</button>
        </div>
      </div>
      <div class="page-map-body">
        <aside class="page-map-nav">
          <div class="page-map-search-wrap">
            <input class="page-map-search" id="pageMapSearch" type="search" name="figma_page_map_query" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="search" aria-label="Search project file page or user" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" placeholder="SEARCH PROJECT / FILE / PAGE / USER" oninput="setPageMapSearch(this.value)">
            <button class="page-map-search-clear" id="pageMapSearchClear" type="button" aria-label="Clear search" onclick="clearPageMapSearch()" hidden></button>
          </div>
          <div class="section-label">DIRECTORY</div>
          <div id="pageMapNav"></div>
        </aside>
        <div class="page-map-resizer" id="pageMapResizer" role="separator" aria-orientation="vertical" aria-label="Resize directory" tabindex="0"></div>
        <main class="page-map-content" id="pageMapContentWrap">
          <div class="file-versions-toolbar">
            <div class="section-label" id="pageMapSummary">PROJECTS</div>
            <div class="page-analysis-status" id="pageMapStatus"></div>
          </div>
          <div id="pageMapContent"></div>
        </main>
      </div>
    </section>
  </div>

  <div id="changelogView" class="view-panel">
    <!-- ═══ Source: Time + Action ═══ -->
    <section class="source-section">
      <div class="changelog-toolbar">
        <div>
          <div class="section-label">RANGE</div>
          <div class="controls">
            <button class="pill" id="days7" onclick="setDays(7)">7D</button>
            <button class="pill" id="days14" onclick="setDays(14)">14D</button>
            <button class="pill active" id="days30" onclick="setDays(30)">30D</button>
            <button class="pill" id="days90" onclick="setDays(90)">90D</button>
            <span class="controls-separator"></span>
            <button class="pill interactive" id="fetchBtn" onclick="fetchChangelog()">FETCH</button>
            <button class="pill" id="exportBtn" onclick="exportCSV()" style="display:none">EXPORT CSV</button>
          </div>
        </div>
        <div class="embedded-actions">
          <span class="header-meta embedded-meta" data-header-meta></span>
          <span class="token-status" data-token-status></span>
          <button class="pill" onclick="openSettings()">SETTINGS</button>
        </div>
      </div>
    </section>

    <!-- ═══ Overview Stats ═══ -->
    <section id="overviewSection" style="display:none">
      <div class="section-label">PROJECT OVERVIEW</div>
      <div id="statsRow" class="stats-row stats-row--overview"></div>
    </section>

    <!-- ═══ Filters ═══ -->
    <section id="filtersSection" style="display:none">
      <div class="section-label">FILTER</div>
      <div class="filter-group filter-group--files">
        <div class="filter-group-label">FILES</div>
        <div id="filterRow" class="filter-row"></div>
      </div>
      <div class="filter-divider" id="filterDivider"></div>
      <div class="filter-group filter-group--users">
        <div class="filter-group-label">USERS</div>
        <div id="userFilterRow" class="filter-row"></div>
      </div>
    </section>

    <!-- ═══ User Detail Stats (shown when user is selected) ═══ -->
    <section id="userStatsSection" style="display:none">
      <div class="section-label">USER DETAIL</div>
      <div id="userDetailHeader" class="user-detail-header"></div>
      <div id="userStatsRow" class="stats-row"></div>
    </section>

    <!-- ═══ Timeline ═══ -->
    <section id="timelineSection">
      <div id="timeline"></div>
    </section>
  </div>

</div>

<!-- Settings Dialog -->
<div class="dialog-backdrop" id="settingsBackdrop" onclick="if(event.target===this)closeSettings()">
  <div class="dialog settings-dialog">
    <button class="dialog-close" onclick="closeSettings()">&times;</button>
    <div class="dialog-title">Settings</div>
    <div class="dialog-field">
      <label>FIGMA PERSONAL ACCESS TOKEN</label>
      <input class="token-secret-input" type="text" id="tokenInput" name="figma_personal_access_token_local_only" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" aria-label="Figma personal access token" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" placeholder="figd_xxxxxxxxxxxxxxxx">
      <div class="dialog-hint">Figma Settings &rarr; Personal Access Tokens</div>
    </div>
    <div class="settings-projects">
      <div class="section-label">PROJECTS</div>
      <div class="project-list" id="projectList"></div>
      <div class="settings-add-project">
        <input type="text" id="addNameInput" name="figma_project_display_name" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" aria-label="Project display name" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" placeholder="NAME">
        <input type="text" id="addIdInput" name="figma_project_or_team_url" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" aria-label="Project or team URL" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" placeholder="PROJECT OR TEAM URL">
        <button class="btn-add-circle" onclick="addProject()">+</button>
      </div>
    </div>
    <div id="settingsStatus"></div>
    <div class="dialog-actions">

<script>
const API_BASE = 'https://api.figma.com/v1';
const STORAGE_KEY = 'figma-changelog-projects';
const TOKEN_KEY = 'figma-changelog-token';
const CACHE_KEY = 'figma-changelog-cache';
const AVATAR_URL_KEY = 'figma-changelog-avatar-urls';
const PAGE_ANALYSIS_KEY = 'figma-changelog-page-analysis';
const PAGE_MAP_CACHE_KEY = 'figma-changelog-page-map';
const PAGE_MAP_NAV_WIDTH_KEY = 'figma-changelog-page-map-nav-width';
const PAGE_ANALYSIS_BATCH_SIZE = 5;
const DEFAULT_PAGE_MAP_PROJECT_IDS = ['611888617', '611818804', '611779334', '571570024'];
const AUTO_FETCH_INTERVAL_MS = 5 * 60 * 1000;
const PAGE_MAP_NAV_WIDTH_DEFAULT = 300;
const PAGE_MAP_NAV_WIDTH_MIN = 220;
const PAGE_MAP_NAV_WIDTH_MAX = 560;
let allVersions = [];
let allFiles = [];
let activeFileFilter = null;
let selectedProjectId = null;
let currentDays = 30;
let activeUserFilter = null;
let liveAvatarUrls = {};
let activeFileDialogKey = null;
let filePagesByKey = {};
let pageAnalysisByFile = {};
let autoFetchInFlight = false;
let autoFetchTimerId = null;
let activeView = 'map';

function loadLiveAvatarUrls() {
  try { liveAvatarUrls = JSON.parse(localStorage.getItem(AVATAR_URL_KEY)) || {}; }
  catch { liveAvatarUrls = {}; }
}

function saveLiveAvatarUrls() {
  try { localStorage.setItem(AVATAR_URL_KEY, JSON.stringify(liveAvatarUrls)); } catch {}
}

function loadPageAnalysisCache() {
  try {
    const raw = localStorage.getItem(PAGE_ANALYSIS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    pageAnalysisByFile = data.files || {};
  } catch {
    pageAnalysisByFile = {};
  }
}

function savePageAnalysisCache() {
  try {
    localStorage.setItem(PAGE_ANALYSIS_KEY, JSON.stringify({
      schema: 1,
      ts: Date.now(),
      files: pageAnalysisByFile,
    }));
    return true;
  } catch {
    return false;
  }
}

function ingestUserFromVersion(userObj) {
  if (!userObj) return;
  if (userObj.img_url) {
    if (userObj.handle) liveAvatarUrls[userObj.handle] = userObj.img_url;
    if (userObj.id) liveAvatarUrls['id:' + userObj.id] = userObj.img_url;
  }
}

function getAvatarUrl(user) {
  if (liveAvatarUrls[user]) return liveAvatarUrls[user];
  const v = allVersions.find(v => v.user === user);
  if (v?.userId && liveAvatarUrls['id:' + v.userId]) return liveAvatarUrls['id:' + v.userId];
  const withImg = allVersions.find(v => v.user === user && v.userImg);
  return withImg?.userImg || '';
}

function userColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return `hsl(${h % 360}, 42%, 40%)`;
}

function initialsAvatarDataUrl(name) {
  const parts = String(name).trim().split(/[\s._-]+/).filter(Boolean);
  const initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length - 1][0])
    : (String(name).slice(0, 2) || '?');
  const text = initials.toUpperCase().slice(0, 2);
  const bg = userColor(name);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="${bg}"/><text x="32" y="32" dy="0.35em" text-anchor="middle" fill="#fff" font-family="Space Grotesk,sans-serif" font-size="24" font-weight="600">${text}</text></svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function avatarHtml(user, size, extraStyle) {
  const sz = size || 18;
  const st = extraStyle || '';
  const placeholder = initialsAvatarDataUrl(user);
  return `<img class="version-avatar" data-avatar-user="${escAttr(user)}" src="${placeholder}" alt="${esc(user)}" title="${esc(user)}" referrerpolicy="no-referrer" style="width:${sz}px;height:${sz}px;${st}">`;
}

function bindAvatarImg(img) {
  const user = img.dataset.avatarUser;
  if (!user) return;
  const url = getAvatarUrl(user);
  if (!url) return;

  const fallback = () => { img.src = initialsAvatarDataUrl(user); };
  const policies = ['no-referrer', 'strict-origin-when-cross-origin', 'origin'];
  let idx = 0;

  const tryNext = () => {
    if (idx >= policies.length) { fallback(); return; }
    const policy = policies[idx++];
    const probe = new Image();
    probe.referrerPolicy = policy;
    probe.onload = () => {
      img.referrerPolicy = policy;
      img.src = url;
    };
    probe.onerror = tryNext;
    probe.src = url;
  };
  tryNext();
}

function hydrateAvatars(root) {
  (root || document).querySelectorAll('img[data-avatar-user]').forEach(bindAvatarImg);
}

function syncVersionUserImgs() {
  allVersions.forEach(v => {
    const fresh = getAvatarUrl(v.user);
    if (fresh) v.userImg = fresh;
  });
}

function isValidFileName(name, key) {
  return name && name.trim() && name.trim() !== key;
}

function getFileName(fileKey) {
  const f = allFiles.find(f => f.key === fileKey);
  if (isValidFileName(f?.name, fileKey)) return f.name.trim();
  const v = allVersions.find(v => v.fileKey === fileKey && isValidFileName(v.fileName, fileKey));
  if (v) return v.fileName.trim();
  return fileKey;
}

function displayFileName(fileKey) {
  const name = getFileName(fileKey);
  return name !== fileKey ? name : 'UNTITLED FILE';
}

function syncFileNamesFromVersions() {
  allVersions.forEach(v => {
    if (!v.fileKey || !isValidFileName(v.fileName, v.fileKey)) return;
    const name = v.fileName.trim();
    let f = allFiles.find(f => f.key === v.fileKey);
    if (f) {
      if (!isValidFileName(f.name, v.fileKey)) f.name = name;
    } else {
      allFiles.push({ key: v.fileKey, name });
    }
  });
}

function mergeFileEntry(f) {
  if (!f?.key) return;
  const existing = allFiles.find(ef => ef.key === f.key);
  if (!existing) {
    allFiles.push({ key: f.key, name: f.name || '' });
    return;
  }
  if (isValidFileName(f.name, f.key) && !isValidFileName(existing.name, f.key)) {
    existing.name = f.name.trim();
  }
}

async function refreshMissingFileNamesFromApi() {
  const token = getToken();
  if (!token) return;

  const keys = [...new Set(allVersions.map(v => v.fileKey))];
  const missing = keys.filter(k => getFileName(k) === k);
  if (!missing.length) return;

  const delay = ms => new Promise(r => setTimeout(r, ms));
  for (let i = 0; i < missing.length; i++) {
    const key = missing[i];
    try {
      const meta = await figmaGet(`/files/${key}?depth=1`, token);
      const name = meta.name?.trim();
      if (isValidFileName(name, key)) {
        let f = allFiles.find(f => f.key === key);
        if (f) f.name = name;
        else allFiles.push({ key, name });
        allVersions.forEach(v => { if (v.fileKey === key) v.fileName = name; });
      }
    } catch (e) {
      console.warn('File name fetch failed for', key, e);
    }
    if (i < missing.length - 1) await delay(200);
  }
}

async function refreshAvatarUrlsFromApi() {
  const token = getToken();
  if (!token || !allFiles.length) return;

  const fileKeys = [...new Set(allFiles.map(f => f.key))];
  const delay = ms => new Promise(r => setTimeout(r, ms));

  for (let i = 0; i < fileKeys.length; i++) {
    try {
      const vData = await figmaGet(`/files/${fileKeys[i]}/versions`, token);
      (vData.versions || []).forEach(ver => ingestUserFromVersion(ver.user));
    } catch (e) {
      console.warn('Avatar URL refresh failed for file', fileKeys[i], e);
    }
    if (i < fileKeys.length - 1) await delay(150);
  }

  syncVersionUserImgs();
  saveLiveAvatarUrls();
}

async function resolveAvatars(days, projectId) {
  syncFileNamesFromVersions();
  if (getToken()) {
    await refreshAvatarUrlsFromApi();
    await refreshMissingFileNamesFromApi();
  }
  refreshAvatarsUI(days);
  if (projectId != null) saveCache(projectId, days);
}

function refreshAvatarsUI(days) {
  renderStats(allFiles, days || getDays());
  renderFilters();
  renderUserFilters();
  renderTimeline();
  if (activeUserFilter) renderUserStats();
  hydrateAvatars(document.querySelector('.page'));
  hydrateAvatars(document.getElementById('fileDialogBackdrop'));
}

function clampNumber(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function getPageMapNavMaxWidth() {
  const body = document.querySelector('.page-map-body');
  if (!body) return PAGE_MAP_NAV_WIDTH_MAX;
  return Math.max(PAGE_MAP_NAV_WIDTH_MIN, Math.min(PAGE_MAP_NAV_WIDTH_MAX, body.clientWidth - 360));
}

function applyPageMapNavWidth(width, persist) {
  const body = document.querySelector('.page-map-body');
  const resizer = document.getElementById('pageMapResizer');
  if (!body) return PAGE_MAP_NAV_WIDTH_DEFAULT;

  const clamped = clampNumber(Math.round(width || PAGE_MAP_NAV_WIDTH_DEFAULT), PAGE_MAP_NAV_WIDTH_MIN, getPageMapNavMaxWidth());
  body.style.setProperty('--page-map-nav-width', `${clamped}px`);
  if (resizer) resizer.setAttribute('aria-valuenow', String(clamped));
  if (persist) {
    try { localStorage.setItem(PAGE_MAP_NAV_WIDTH_KEY, String(clamped)); } catch {}
  }
  return clamped;
}

function loadPageMapNavWidth() {
  let width = PAGE_MAP_NAV_WIDTH_DEFAULT;
  try {
    const saved = parseInt(localStorage.getItem(PAGE_MAP_NAV_WIDTH_KEY), 10);
    if (Number.isFinite(saved)) width = saved;
  } catch {}
  applyPageMapNavWidth(width, false);
}

let pageMapNavResizeState = null;

function initPageMapResizer() {
  const body = document.querySelector('.page-map-body');
  const resizer = document.getElementById('pageMapResizer');
  if (!body || !resizer) return;

  resizer.setAttribute('aria-valuemin', String(PAGE_MAP_NAV_WIDTH_MIN));
  resizer.setAttribute('aria-valuemax', String(PAGE_MAP_NAV_WIDTH_MAX));
  loadPageMapNavWidth();

  resizer.addEventListener('pointerdown', e => {
    if (window.matchMedia('(max-width: 768px)').matches) return;
    const rect = body.getBoundingClientRect();
    resizer.focus({ preventScroll: true });
    pageMapNavResizeState = {
      left: rect.left,
      width: parseInt(getComputedStyle(body).getPropertyValue('--page-map-nav-width'), 10) || PAGE_MAP_NAV_WIDTH_DEFAULT,
    };
    document.body.classList.add('page-map-nav-resizing');
    resizer.setPointerCapture?.(e.pointerId);
    e.preventDefault();
  });

  resizer.addEventListener('keydown', e => {
    if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(e.key)) return;
    e.preventDefault();
    const current = parseInt(getComputedStyle(body).getPropertyValue('--page-map-nav-width'), 10) || PAGE_MAP_NAV_WIDTH_DEFAULT;
    const step = e.shiftKey ? 40 : 16;
    let next = current;
    if (e.key === 'ArrowLeft') next = current - step;
    if (e.key === 'ArrowRight') next = current + step;
    if (e.key === 'Home') next = PAGE_MAP_NAV_WIDTH_MIN;
    if (e.key === 'End') next = getPageMapNavMaxWidth();
    applyPageMapNavWidth(next, true);
  });

  window.addEventListener('pointermove', e => {
    if (!pageMapNavResizeState) return;
    pageMapNavResizeState.width = applyPageMapNavWidth(e.clientX - pageMapNavResizeState.left, false);
  });

  const endResize = () => {
    if (!pageMapNavResizeState) return;
    applyPageMapNavWidth(pageMapNavResizeState.width, true);
    pageMapNavResizeState = null;
    document.body.classList.remove('page-map-nav-resizing');
  };

  window.addEventListener('pointerup', endResize);
  window.addEventListener('pointercancel', endResize);

  window.addEventListener('resize', () => {
    const current = parseInt(getComputedStyle(body).getPropertyValue('--page-map-nav-width'), 10) || PAGE_MAP_NAV_WIDTH_DEFAULT;
    applyPageMapNavWidth(current, false);
  });
}

function getInitialView() {
  const params = new URLSearchParams(window.location.search);
  const view = params.get('view') || window.location.hash.replace(/^#/, '');
  return view === 'changelog' ? 'changelog' : 'map';
}

function isHexColor(value) {
  return /^#[0-9a-f]{6}$/i.test(value || '');
}

function platformColorParam(params, key) {
  const value = params.get(key) || '';
  return isHexColor(value) ? value : '';
}

function platformFontParam(params, key) {
  const value = (params.get(key) || '').trim();
  if (!value || value.length > 180 || /[;{}<>]/.test(value)) return '';
  return value;
}

function platformPxParam(params, key, min, max) {
  const value = Number(params.get(key));
  if (!Number.isFinite(value) || value < min || value > max) return '';
  return `${value}px`;
}

function hexLuminance(hex) {
  if (!isHexColor(hex)) return 0;
  const raw = parseInt(hex.slice(1), 16);
  const channels = [(raw >> 16) & 255, (raw >> 8) & 255, raw & 255];
  const normalized = channels.map(channel => {
    const value = channel / 255;
    return value <= 0.03928 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
  });
  return (0.2126 * normalized[0]) + (0.7152 * normalized[1]) + (0.0722 * normalized[2]);
}

function hexToRgba(hex, alpha) {
  if (!isHexColor(hex)) return '';
  const number = parseInt(hex.slice(1), 16);
  const red = (number >> 16) & 255;
  const green = (number >> 8) & 255;
  const blue = number & 255;
  return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
}

function applyPlatformTheme(params) {
  const root = document.documentElement;
  const bg = platformColorParam(params, 'bg');
  const surface = platformColorParam(params, 'surface');
  const surfaceRaised = platformColorParam(params, 'surfaceRaised');
  const surfaceSoft = platformColorParam(params, 'surfaceSoft');
  const navActiveBg = platformColorParam(params, 'navActiveBg');
  const border = platformColorParam(params, 'border');
  const text = platformColorParam(params, 'text');
  const textSecondary = platformColorParam(params, 'textSecondary');
  const muted = platformColorParam(params, 'muted');
  const accent = platformColorParam(params, 'accent');
  const danger = platformColorParam(params, 'danger');
  const uiFont = platformFontParam(params, 'uiFont');
  const codeFont = platformFontParam(params, 'codeFont');
  const uiSize = platformPxParam(params, 'uiSize', 12, 18);
  const codeSize = platformPxParam(params, 'codeSize', 11, 18);

  const mappings = [
    ['--black', bg],
    ['--surface', surface],
    ['--surface-raised', surfaceRaised],
    ['--platform-surface-soft', surfaceSoft],
    ['--platform-nav-active-bg', navActiveBg],
    ['--border', border],
    ['--border-visible', border],
    ['--text-display', text],
    ['--text-primary', text],
    ['--text-secondary', textSecondary],
    ['--text-disabled', muted],
    ['--interactive', accent],
    ['--accent', danger],
  ];

  mappings.forEach(([name, value]) => {
    if (value) root.style.setProperty(name, value);
  });

  const interactiveSubtle = accent ? hexToRgba(accent, 0.1) : '';
  const dangerSubtle = danger ? hexToRgba(danger, 0.1) : '';
  if (interactiveSubtle) root.style.setProperty('--interactive-subtle', interactiveSubtle);
  if (dangerSubtle) root.style.setProperty('--accent-subtle', dangerSubtle);
  if (uiFont) root.style.setProperty('--platform-ui-font', uiFont);
  if (codeFont) root.style.setProperty('--platform-code-font', codeFont);
  if (uiSize) root.style.setProperty('--platform-ui-size', uiSize);
  if (codeSize) root.style.setProperty('--platform-code-size', codeSize);

  const isLightSurface = hexLuminance(bg || surface || '#000000') > 0.62;
  root.style.setProperty('--success', isLightSurface ? '#15803D' : '#4ADE80');
  root.style.setProperty(
    '--success-subtle',
    isLightSurface ? 'rgba(21,128,61,0.10)' : 'rgba(74,222,128,0.14)'
  );
}

function updateTokenStatus() {

    </span>`;
  });

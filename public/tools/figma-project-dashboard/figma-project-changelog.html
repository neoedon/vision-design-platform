function selectProject(id) {
  selectedProjectId = selectedProjectId === id ? null : id;
  renderProjectList();
  if (selectedProjectId) {
    const cached = loadCache(selectedProjectId);
    if (cached) {
      allVersions = cached.versions;
      allFiles = cached.files;
      activeFileFilter = null;
      activeUserFilter = null;
      computeSessionDurations();
      syncFileNamesFromVersions();
      showSections();
      renderStats(allFiles, cached.days);
      renderFilters();
      renderUserFilters();
      renderUserStats();
      renderTimeline();
      hydrateAvatars(document.querySelector('.page'));
      resolveAvatars(cached.days, id);
      const proj = getSavedProjects().find(p => p.id === id);
      const age = Math.round((Date.now() - cached.ts) / 60000);
      const ageStr = age < 60 ? `${age}M AGO` : `${Math.round(age/60)}H AGO`;
      setHeaderMeta(`${proj?.name || id} / ${cached.days}D / CACHED ${ageStr}`);
    }
  } else {
    allVersions = [];
    allFiles = [];
    activeFileFilter = null;
    activeUserFilter = null;
    hideSections();
    setHeaderMeta('');
  }
}

function extractProjectId(raw) {
  const match = raw.match(/project\/(\d+)/);
  if (match) return match[1];
  const digits = raw.match(/^\d+$/);
  return digits ? digits[0] : null;
}

function extractTeamId(raw) {
  const match = raw.match(/(?:files\/)?team\/(\d+)/);
  return match ? match[1] : null;
}

function mergeSavedProjects(incoming) {
  const projects = getSavedProjects();
  const byId = new Map(projects.map(p => [p.id, p]));
  let added = 0;
  let updated = 0;

  incoming.forEach(item => {
    const id = String(item.id || '').trim();
    if (!id) return;
    const name = (item.name || 'PROJECT ' + id).trim();
    if (byId.has(id)) {
      const current = byId.get(id);
      if (name && current.name !== name) {
        current.name = name;
        updated += 1;
      }
      return;
    }
    const next = { name, id };
    projects.push(next);
    byId.set(id, next);
    added += 1;
  });

  saveProjects(projects);
  invalidatePageMapCache();
  renderProjectList();
  return { added, updated, total: projects.length };
}

async function importTeamProjects(teamId) {
  const token = getToken();
  if (!token) {
    showError('[ERROR: SAVE FIGMA TOKEN BEFORE IMPORTING TEAM PROJECTS]');
    return;
  }

  setStatus(`[IMPORTING TEAM PROJECTS · ${teamId}]`, true);
  try {
    const data = await figmaGet(`/teams/${teamId}/projects`, token);
    const incoming = (data.projects || []).map(project => ({
      id: project.id,
      name: project.name || 'PROJECT ' + project.id,
    }));

    if (!incoming.length) {
      showError('[NO PROJECTS RETURNED FOR THIS TEAM]');
      return;
    }

    const result = mergeSavedProjects(incoming);
    selectedProjectId = null;
    hideError();
    loadAllProjectsCache(`ALL PROJECTS / TEAM ${teamId} IMPORTED`);
    showNotice(`[IMPORTED ${result.added} PROJECT(S), UPDATED ${result.updated}, TOTAL ${result.total}]`);
    if (activeView === 'map') loadPageMap(true);
    startAutoFetchLoop();
  } catch (e) {
    showError(e.message || String(e));
  } finally {
    hideStatus();
  }
}

async function addProject() {
  const nameInput = document.getElementById('addNameInput');
  const idInput = document.getElementById('addIdInput');
  const name = nameInput.value.trim();
  const rawId = idInput.value.trim();

  if (!rawId) { showError('[ERROR: PROJECT OR TEAM URL REQUIRED]'); idInput.focus(); return; }

  const teamId = extractTeamId(rawId);
  if (teamId) {
    await importTeamProjects(teamId);
    nameInput.value = '';
    idInput.value = '';
    return;
  }

  const id = extractProjectId(rawId);
  if (!id) { showError('[ERROR: CANNOT PARSE PROJECT ID FROM INPUT]'); idInput.focus(); return; }

  const existing = getSavedProjects();
  if (existing.some(p => p.id === id)) {
    showError('[ERROR: PROJECT ID ALREADY EXISTS]');
    return;
  }

  mergeSavedProjects([{ name: name || 'PROJECT ' + id, id }]);
  selectedProjectId = id;
  hideError();
  nameInput.value = '';
  idInput.value = '';
  renderProjectList();
  if (activeView === 'map') loadPageMap(true);
}

function removeProject(index) {

  renderProjectList();
}

async function figmaGet(path, token) {
  const res = await fetch(`${API_BASE}${path}`, { headers: { 'X-FIGMA-TOKEN': token } });
  if (!res.ok) {
    const text = await res.text();
    if (res.status === 403) throw new Error('[ERROR: TOKEN INVALID OR NO ACCESS]');
    if (res.status === 404) throw new Error('[ERROR: PROJECT NOT FOUND]');
    if (res.status === 429) throw new Error('[ERROR: RATE LIMITED — RETRY LATER]');
    throw new Error(`[ERROR: API ${res.status}]`);
  }
  return res.json();
}

async function fetchProjectChangelogData(projectId, token, days, onProgress) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);

  onProgress?.({ phase: 'files' });
  const projData = await figmaGet(`/projects/${projectId}/files`, token);
  const files = projData.files || [];
  const versions = [];

  if (!files.length) {
    return {
      projectId,
      projectName: projData.name || 'PROJECT ' + projectId,
      rawProjectName: projData.name || '',
      files,
      versions,
    };
  }

  const delay = (ms) => new Promise(r => setTimeout(r, ms));
  onProgress?.({ phase: 'versions', completed: 0, total: files.length });

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    try {
      const vData = await figmaGet(`/files/${file.key}/versions`, token);
      (vData.versions || []).forEach(ver => ingestUserFromVersion(ver.user));
      const fileVersions = (vData.versions || []).filter(v => new Date(v.created_at) >= cutoff);
      fileVersions.forEach(v => {
        const handle = v.user ? v.user.handle : 'Unknown';
        versions.push({
          fileKey: file.key,
          fileName: file.name,
          id: v.id,
          label: v.label || '',
          description: v.description || '',
          createdAt: new Date(v.created_at),
          user: handle,
          userId: v.user ? v.user.id : '',
          userImg: v.user ? (v.user.img_url || liveAvatarUrls[handle] || (v.user.id ? liveAvatarUrls['id:' + v.user.id] : '') || '') : '',
        });
      });
    } catch (e) {
      console.warn(`Failed to fetch versions for ${file.name}:`, e);
    }
    onProgress?.({ phase: 'versions', completed: i + 1, total: files.length });
    if (i < files.length - 1) await delay(200);
  }

  versions.sort((a, b) => b.createdAt - a.createdAt);

  return {
    projectId,
    projectName: projData.name || 'PROJECT ' + projectId,
    rawProjectName: projData.name || '',
    files,
    versions,
  };
}

async function fetchChangelog() {
  const token = getToken();
  const projectId = getProjectId();
  const days = getDays();

  if (!token) { showError('[ERROR: NO TOKEN — OPEN SETTINGS]'); return; }
  if (!projectId) { showError('[ERROR: SELECT A PROJECT]'); return; }

  hideError();
  allVersions = [];
  allFiles = [];
  activeFileFilter = null;
  activeUserFilter = null;
  hideSections();
  document.getElementById('fetchBtn').disabled = true;

  try {
    const data = await fetchProjectChangelogData(projectId, token, days, progress => {
      if (progress.phase === 'files') {
        setStatus('[LOADING PROJECT FILES...]', true);
      } else {
        setStatus(`[FETCHING VERSIONS... ${progress.completed} / ${progress.total}]`, true);

    });

        '<div class="empty-state"><div class="empty-title">[NO FILES]</div><div class="empty-sub">This project contains no files</div></div>';

  } finally {
    document.getElementById('fetchBtn').disabled = false;
  }
}

function computeSessionDurations() {
  const SESSION_GAP = 30 * 60 * 1000; // 30min gap = new session
  allVersions.forEach(v => { delete v.sessionDuration; });

  const byUserFile = {};
  const sorted = [...allVersions].sort((a, b) => a.createdAt - b.createdAt);

  sorted.forEach(v => {
    const key = `${v.user}::${v.fileKey}`;
    if (!byUserFile[key]) byUserFile[key] = [];
    byUserFile[key].push(v);
  });

  Object.values(byUserFile).forEach(versions => {
    if (versions.length < 2) return;
    let sessionGroup = [versions[0]];

    for (let i = 1; i < versions.length; i++) {
      const curr = versions[i];
      const prev = versions[i - 1];
      const gap = curr.createdAt - prev.createdAt;

      if (gap > SESSION_GAP) {
        markSession(sessionGroup);
        sessionGroup = [curr];
      } else {
        sessionGroup.push(curr);
      }
    }
    markSession(sessionGroup);
  });
}

function markSession(group) {
  if (group.length < 2) return;
  const dur = group[group.length - 1].createdAt - group[0].createdAt;
  if (dur < 60000) return;
  group.forEach(v => { v.sessionDuration = dur; });
}

function formatDuration(ms) {
  const mins = Math.round(ms / 60000);
  if (mins < 60) return `${mins}M`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? `${h}H ${m}M` : `${h}H`;
}

function formatShortDate(d) {

}

function getFilePagesFromPageMap(fileKey) {

  for (const project of pageMapData) {

    if (file && Array.isArray(file.pages)) {
      return file.pages.map(page => ({
        id: page.id,
        name: page.name || 'Untitled Page',

  }
  return null;
}

async function loadFileCurrentPages(fileKey) {
  const cached = getCachedFilePages(fileKey);
  if (cached) {
    renderFileCurrentPages(fileKey, cached, { status: 'CACHED' });
  } else {
    renderFileCurrentPages(fileKey, [], { status: 'LOADING', message: 'LOADING PAGES' });
  }

  const token = getToken();
  if (!token) {
    if (!cached && activeFileDialogKey === fileKey) {
      renderFileCurrentPages(fileKey, [], { status: 'NO TOKEN', message: 'OPEN SETTINGS AND SAVE FIGMA TOKEN FIRST' });
    }
    return;
  }

  try {
    const data = await figmaGet(`/files/${fileKey}?depth=1`, token);
    if (data?.name) mergeFileEntry({ key: fileKey, name: data.name });
    const pages = pagesFromFileData(data);
    filePagesByKey[fileKey] = pages;
    if (activeFileDialogKey === fileKey) {
      renderFileCurrentPages(fileKey, pages, { status: 'LIVE' });
    }
  } catch (e) {
    if (activeFileDialogKey !== fileKey) return;
    const message = e.message || String(e);
    if (cached) {
      renderFileCurrentPages(fileKey, cached, { status: 'CACHED', message: `LIVE LOAD FAILED · ${message}` });
    } else {
      renderFileCurrentPages(fileKey, [], { status: 'ERROR', message });
    }
  }
}

function stableStringify(value) {
  if (value === undefined) return 'null';
  if (value === null || typeof value !== 'object') return JSON.stringify(value);
  if (Array.isArray(value)) return '[' + value.map(stableStringify).join(',') + ']';

  const keys = Object.keys(value).sort();
  return '{' + keys.map(k => JSON.stringify(k) + ':' + stableStringify(value[k])).join(',') + '}';
}

function hashString(str) {
  let hash = 2166136261;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(16);
}

function countNodes(node) {
  if (!node || !Array.isArray(node.children)) return 1;
  return 1 + node.children.reduce((sum, child) => sum + countNodes(child), 0);
}

async function fetchFilePageSnapshot(fileKey, versionId, token) {
  const data = await figmaGet(`/files/${fileKey}?version=${encodeURIComponent(versionId)}`, token);
  const pages = (data.document?.children || []).filter(node => node.type === 'CANVAS');

  return {
    versionId,
    pages: pages.map(page => ({
      id: page.id,
      name: page.name || 'UNTITLED PAGE',
      nodeCount: countNodes(page),
      hash: hashString(stableStringify(page)),
    })),
  };
}

function diffPageSnapshots(current, previous) {
  const currentById = new Map(current.pages.map(p => [p.id, p]));
  const previousById = new Map(previous.pages.map(p => [p.id, p]));
  const pages = [];

  current.pages.forEach(page => {
    const oldPage = previousById.get(page.id);
    if (!oldPage) {
      pages.push({ id: page.id, name: page.name, changeType: 'added' });
    } else if (oldPage.hash !== page.hash) {
      pages.push({ id: page.id, name: page.name, changeType: 'changed' });
    }
  });

  previous.pages.forEach(page => {
    if (!currentById.has(page.id)) {
      pages.push({ id: page.id, name: page.name, changeType: 'removed' });
    }
  });

  pages.sort((a, b) => a.name.localeCompare(b.name));
  return pages.length
    ? { status: 'changed', pages, comparedTo: previous.versionId }
    : { status: 'unchanged', pages: [], comparedTo: previous.versionId };
}

function getPageAnalysisBucket(fileKey) {
  const bucket = pageAnalysisByFile[fileKey] || { ts: Date.now(), versions: {} };
  if (!bucket.versions) bucket.versions = {};
  return bucket;
}

function getAnalyzedVersionCount(fileKey, versions) {
  const bucket = pageAnalysisByFile[fileKey];
  if (!bucket?.versions) return 0;
  let count = 0;
  while (count < versions.length && bucket.versions[versions[count].id]) count++;
  return count;
}

function setPageAnalysisButtonsDisabled(disabled) {
  const analyzeButton = document.getElementById('fileDialogAnalyze');
  const moreButton = document.getElementById('fileDialogAnalyzeMore');
  if (analyzeButton) analyzeButton.disabled = disabled;
  if (moreButton) moreButton.disabled = disabled;
}

function updatePageAnalysisControls(fileKey) {
  const versions = getFileDialogVersions(fileKey);
  const moreButton = document.getElementById('fileDialogAnalyzeMore');
  if (!moreButton) return;

  const analyzedCount = getAnalyzedVersionCount(fileKey, versions);
  const hasMore = versions.length > 1 && analyzedCount > 0 && analyzedCount < versions.length;
  moreButton.disabled = !hasMore;
  moreButton.textContent = analyzedCount > 0
    ? `ANALYZE MORE (${analyzedCount}/${versions.length})`
    : 'ANALYZE MORE';
}

async function analyzeFilePages(fileKey, startIndex) {
  const token = getToken();
  const versions = getFileDialogVersions(fileKey);
  const batchStart = Math.max(0, startIndex || 0);

  if (!token) {
    setFilePageAnalysisStatus('[NO TOKEN]', 'err');
    return;
  }

  if (versions.length < 2) {
    setFilePageAnalysisStatus('[NEED 2+ VERSIONS]', 'warn');
    return;
  }

  if (batchStart >= versions.length) {
    setFilePageAnalysisStatus(`[ALL SAVED · ${versions.length}/${versions.length}]`, 'ok');
    updatePageAnalysisControls(fileKey);
    return;
  }

  const batchEnd = Math.min(batchStart + PAGE_ANALYSIS_BATCH_SIZE, versions.length);
  const batchTotal = batchEnd - batchStart;
  const resultBucket = getPageAnalysisBucket(fileKey);
  const snapshotCache = {};
  const delay = ms => new Promise(r => setTimeout(r, ms));

  pageAnalysisByFile[fileKey] = resultBucket;
  setPageAnalysisButtonsDisabled(true);
  renderFileVersionList(fileKey);

  try {
    const getSnapshot = async index => {
      const version = versions[index];
      if (!version) return null;
      if (!snapshotCache[version.id]) {
        setFilePageAnalysisStatus(`[SNAPSHOT ${index + 1} / ${versions.length}]`, 'warn');
        snapshotCache[version.id] = await fetchFilePageSnapshot(fileKey, version.id, token);
      }
      return snapshotCache[version.id];
    };

    for (let i = batchStart; i < batchEnd; i++) {
      const version = versions[i];
      const currentSnapshot = await getSnapshot(i);
      const previousSnapshot = await getSnapshot(i + 1);
      resultBucket.versions[version.id] = previousSnapshot
        ? diffPageSnapshots(currentSnapshot, previousSnapshot)
        : { status: 'baseline', pages: [] };
      resultBucket.ts = Date.now();
      resultBucket.batchSize = PAGE_ANALYSIS_BATCH_SIZE;
      resultBucket.savedCount = getAnalyzedVersionCount(fileKey, versions);

      const saved = savePageAnalysisCache();
      const doneInBatch = i - batchStart + 1;
      setFilePageAnalysisStatus(
        saved
          ? `[SAVED ${doneInBatch}/${batchTotal} · TOTAL ${resultBucket.savedCount}/${versions.length}]`
          : `[SAVE FAILED · ${doneInBatch}/${batchTotal}]`,
        saved ? 'ok' : 'warn'
      );
      if (activeFileDialogKey === fileKey) renderFileVersionList(fileKey);
      if (i < batchEnd - 1) await delay(150);
    }

    const changedCount = Object.values(resultBucket.versions).filter(r => r.status === 'changed').length;
    const analyzedCount = getAnalyzedVersionCount(fileKey, versions);
    setFilePageAnalysisStatus(`[SAVED · ${changedCount} CHANGED · ${analyzedCount}/${versions.length}]`, 'ok');
    renderTimeline();
  } catch (e) {
    console.warn('Page analysis failed for file', fileKey, e);
    setFilePageAnalysisStatus('[ANALYSIS FAILED]', 'err');
  } finally {
    setPageAnalysisButtonsDisabled(false);
    updatePageAnalysisControls(fileKey);
    if (activeFileDialogKey === fileKey) renderFileVersionList(fileKey);
  }
}

function analyzeMoreFilePages(fileKey) {
  const versions = getFileDialogVersions(fileKey);
  return analyzeFilePages(fileKey, getAnalyzedVersionCount(fileKey, versions));
}

function openInFigma(fileKey, nodeId) {
  const desktopUrl = figmaDesktopUrl(fileKey, nodeId);
  const webUrl = figmaWebUrl(fileKey, nodeId);
  const iframe = document.createElement('iframe');
  let appProbablyOpened = false;
  const markAppOpened = () => { appProbablyOpened = true; };
  const handleVisibility = () => {
    if (document.visibilityState === 'hidden') markAppOpened();
  };

  window.addEventListener('blur', markAppOpened, { once: true });
  document.addEventListener('visibilitychange', handleVisibility);

  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  iframe.src = desktopUrl;

  setTimeout(() => {
    if (iframe.parentNode) document.body.removeChild(iframe);
    window.removeEventListener('blur', markAppOpened);
    document.removeEventListener('visibilitychange', handleVisibility);
    if (!appProbablyOpened && document.visibilityState === 'visible') {
      window.open(webUrl, '_blank');
    }
  }, 900);
}

function renderUserStats() {
  const section = document.getElementById('userStatsSection');
  const header = document.getElementById('userDetailHeader');
  const el = document.getElementById('userStatsRow');
  if (!activeUserFilter) {
    section.style.display = 'none';
    return;
  }

  const uv = allVersions.filter(v => v.user === activeUserFilter);
  const files = [...new Set(uv.map(v => v.fileKey))];
  const named = uv.filter(v => v.label).length;
  const totalVersions = allVersions.length;
  const totalActiveFiles = [...new Set(allVersions.map(v => v.fileKey))].length;
  const versionShare = totalVersions ? Math.round((uv.length / totalVersions) * 100) : 0;
  const fileShare = totalActiveFiles ? Math.round((files.length / totalActiveFiles) * 100) : 0;

  let totalSession = 0;
  const sessionSeen = new Set();
  uv.forEach(v => {
    if (v.sessionDuration && !sessionSeen.has(v.fileKey + '::' + v.sessionDuration)) {
      sessionSeen.add(v.fileKey + '::' + v.sessionDuration);
      totalSession += v.sessionDuration;
    }
  });

  const activeDays = new Set();
  uv.forEach(v => {
    const d = v.createdAt;
    activeDays.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  });

  const fileCounts = {};
  uv.forEach(v => { fileCounts[v.fileKey] = (fileCounts[v.fileKey] || 0) + 1; });
  const topEntry = Object.entries(fileCounts).sort((a, b) => b[1] - a[1])[0];
  const topFileKey = topEntry?.[0];
  const topFileCount = topEntry?.[1] || 0;
  const topFileName = displayFileName(topFileKey || '');
  const topShort = topFileName.length > 18 ? topFileName.slice(0, 16) + '...' : topFileName;

  const lastActive = uv.reduce((latest, v) => (!latest || v.createdAt > latest.createdAt) ? v : latest, null);

  section.style.display = '';
  header.innerHTML = `
    ${avatarHtml(activeUserFilter, 24, '')}
    <span class="user-detail-name">${esc(activeUserFilter)}</span>
    <span class="user-detail-meta">LAST ACTIVE · ${lastActive ? formatShortDate(lastActive.createdAt) : '—'}</span>
  `;
  el.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">VERSIONS</div>
      <div class="stat-value">${uv.length}</div>
      <div class="stat-sub">${versionShare}% OF TOTAL · ${named} NAMED · ${uv.length - named} AUTO</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">FILES TOUCHED</div>
      <div class="stat-value">${files.length}</div>
      <div class="stat-sub">${fileShare}% OF ACTIVE · TOP ${esc(topShort).toUpperCase()} (${topFileCount})</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ACTIVE DAYS</div>
      <div class="stat-value">${activeDays.size}</div>
      <div class="stat-sub">UNIQUE EDIT DAYS</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">EST. SESSION TIME</div>
      <div class="stat-value">${totalSession > 0 ? formatDuration(totalSession) : '—'}</div>
      <div class="stat-sub">${totalSession > 0 ? 'FROM VERSION GAP ANALYSIS' : 'NOT ENOUGH DATA'}</div>
    </div>
  `;
  hydrateAvatars(section);
}

function renderTimeline() {
  let filtered = allVersions;
  if (activeFileFilter) filtered = filtered.filter(v => v.fileKey === activeFileFilter);
  if (activeUserFilter) filtered = filtered.filter(v => v.user === activeUserFilter);

  if (filtered.length === 0) {
    document.getElementById('timeline').innerHTML =
      '<div class="empty-state"><div class="empty-title">[NO RESULTS]</div><div class="empty-sub">No changes in this time range</div></div>';
    return;
  }

  const groups = {};
  filtered.forEach(v => {
    const d = v.createdAt;
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const dayKey = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    if (!groups[dayKey]) groups[dayKey] = [];
    groups[dayKey].push(v);
  });

  let html = '';
  Object.entries(groups).forEach(([day, versions]) => {
    html += `<div class="day-group">`;
    html += `<div class="day-header">${day}<span class="day-count">${versions.length}</span></div>`;

    versions.forEach(v => {
      const time = `${String(v.createdAt.getHours()).padStart(2,'0')}:${String(v.createdAt.getMinutes()).padStart(2,'0')}`;
      const isNamed = !!v.label;
      const dotClass = isNamed ? 'named' : 'auto';
      const labelHtml = isNamed
        ? `<div class="version-label-text is-named">${esc(v.label)}</div>`
        : (v.description ? `<div class="version-label-text">${esc(v.description)}</div>` : '');
      const badge = isNamed ? '<span class="badge badge-named">NAMED</span>' : '';
      const durBadge = v.sessionDuration ? `<span class="badge badge-duration">${formatDuration(v.sessionDuration)} SESSION</span>` : '';
      const pagesHtml = pageAnalysisHtml(v);

      html += `
        <div class="version-card">
          <div class="version-time">${time}</div>
          <div class="version-dot ${dotClass}"></div>
          <div class="version-body">
            <div class="version-file">${esc(displayFileName(v.fileKey))}${badge}${durBadge} <a class="file-link" href="#" onclick="event.preventDefault();event.stopPropagation();openFileDialog('${v.fileKey}')">DETAIL</a> <a class="file-link" href="#" onclick="event.preventDefault();event.stopPropagation();openInFigma('${v.fileKey}')">OPEN &rarr;</a></div>
            ${labelHtml}
            ${pagesHtml}
            <div class="version-meta">
              ${avatarHtml(v.user, 18, '')}
              <span>${esc(v.user)}</span>
            </div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('timeline').innerHTML = html;
}

function exportCSV() {
  let filtered = allVersions;
  if (activeFileFilter) filtered = filtered.filter(v => v.fileKey === activeFileFilter);
  if (activeUserFilter) filtered = filtered.filter(v => v.user === activeUserFilter);

  const BOM = '﻿';
  let csv = BOM + 'Time,File,Version Name,Description,User,File Key,Version ID\n';
  filtered.forEach(v => {
    csv += [
      v.createdAt.toISOString(),
      `"${displayFileName(v.fileKey).replace(/"/g,'""')}"`,
      `"${v.label.replace(/"/g,'""')}"`,
      `"${v.description.replace(/"/g,'""')}"`,
      `"${v.user.replace(/"/g,'""')}"`,
      v.fileKey,
      v.id
    ].join(',') + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `figma-changelog-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

let pageMapData = null;
let pageMapFailures = [];
let pageMapCachedAt = 0;
let pageMapSearchQuery = '';
let selectedPageMapProjectId = '';

function getPageMapProjects() {
  const saved = getSavedProjects();
  if (saved.length) {
    return saved.map(project => ({
      id: project.id,
      name: project.name || 'PROJECT ' + project.id,
    }));
  }
  return DEFAULT_PAGE_MAP_PROJECT_IDS.map(id => ({ id, name: 'PROJECT ' + id }));
}

function getPageMapProjectIds() {
  return getPageMapProjects().map(project => project.id);
}

function invalidatePageMapCache() {
  pageMapData = null;
  pageMapFailures = [];
  pageMapCachedAt = 0;
  selectedPageMapProjectId = '';
  try { localStorage.removeItem(PAGE_MAP_CACHE_KEY); } catch {}
}

function pageMapProjectIdsMatch(ids) {
  const currentIds = getPageMapProjectIds();
  return Array.isArray(ids) && ids.join('|') === currentIds.join('|');
}

function loadPageMapCache() {
  try {
    const raw = localStorage.getItem(PAGE_MAP_CACHE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!pageMapProjectIdsMatch(data.projectIds)) return;
    pageMapData = Array.isArray(data.projects) ? data.projects : null;
    pageMapFailures = Array.isArray(data.failures) ? data.failures : [];
    pageMapCachedAt = data.ts || 0;
  } catch {
    pageMapData = null;
    pageMapFailures = [];
    pageMapCachedAt = 0;
  }
}

function savePageMapCache() {
  if (!pageMapData?.length) return false;
  try {
    pageMapCachedAt = Date.now();
    localStorage.setItem(PAGE_MAP_CACHE_KEY, JSON.stringify({
      ts: pageMapCachedAt,
      projectIds: getPageMapProjectIds(),
      projects: pageMapData,
      failures: pageMapFailures,
    }));
    return true;
  } catch {
    return false;
  }
}

function pageMapAnchor(type, projectIndex, fileIndex, pageIndex) {

function pageMapCacheAge(ts) {
  if (!ts) return '';
  const mins = Math.max(0, Math.round((Date.now() - ts) / 60000));
  if (mins < 1) return 'NOW';
  if (mins < 60) return `${mins}M AGO`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours}H AGO`;
  return `${Math.round(hours / 24)}D AGO`;
}

function addPageMapUser(map, name, dateValue) {
  if (!name) return;
  const date = dateValue instanceof Date ? dateValue : new Date(dateValue || 0);
  const existing = map.get(name) || { name, count: 0, lastAt: 0 };
  existing.count += 1;
  const time = Number.isFinite(date.getTime()) ? date.getTime() : 0;
  if (time > existing.lastAt) existing.lastAt = time;
  map.set(name, existing);
}

function pageMapUserStats(map) {

  });
}

function normalizePageMapPerson(user) {
  if (!user) return null;
  const name = user.handle || user.name || user.email || '';
  if (!name) return null;
  return {
    id: user.id || '',
    name,
    email: user.email || '',
    avatar: user.img_url || user.imgUrl || '',
  };
}

function pageMapRoleLabel(role) {
  const key = String(role || '').toLowerCase();
  const labels = {
    owner: 'OWNER',
    editor: 'EDITOR',
    viewer: 'VIEWER',
    admin: 'ADMIN',
  };
  return labels[key] || (key ? key.replace(/_/g, ' ').toUpperCase() : '');
}

function pageMapLinkAccessLabel(linkAccess) {
  const key = String(linkAccess || '').toLowerCase();
  const labels = {
    inherit: 'PROJECT DEFAULT',
    view: 'ANYONE CAN VIEW',
    edit: 'ANYONE CAN EDIT',
    org_view: 'ORG CAN VIEW',
    org_edit: 'ORG CAN EDIT',
  };
  return labels[key] || (key ? key.replace(/_/g, ' ').toUpperCase() : '');
}

function addPageMapKnownPerson(map, person, role, count) {
  if (!person?.name) return;
  const key = person.id || person.email || person.name;
  const existing = map.get(key) || { ...person, roles: [], score: 0, count: 0 };
  if (role && !existing.roles.includes(role)) existing.roles.push(role);
  existing.count += count || 0;
  existing.score += count || 1;
  map.set(key, existing);
}

function pageMapKnownPeople(file) {
  const people = new Map();
  const roleLabel = pageMapRoleLabel(file.access?.role);
  if (file.currentUser && roleLabel) addPageMapKnownPerson(people, file.currentUser, `YOU ${roleLabel}`, 5);
  addPageMapKnownPerson(people, file.creator, 'CREATOR', 4);
  addPageMapKnownPerson(people, file.lastTouchedBy, 'LAST TOUCHED', 3);
  (file.users || []).forEach(user => {
    addPageMapKnownPerson(people, { name: user.name }, user.count > 1 ? `EDIT ACTIVITY ${user.count}` : 'EDIT ACTIVITY', user.count || 1);
  });
  return [...people.values()].sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
}

function pageMapAccessSearchText(file) {
  const access = file.access || {};
  return [

    pageMapLinkAccessLabel(access.linkAccess),
    access.role,
    pageMapRoleLabel(access.role),

function pageMapFilePeopleSearchText(file) {

function pageMapAccessHtml(file) {
  const access = file.access || {};
  const chips = [];
  if (access.linkAccess) chips.push({ text: `LINK ${pageMapLinkAccessLabel(access.linkAccess)}`, tone: 'primary', title: access.linkAccess });
  if (access.role) chips.push({ text: `YOUR ACCESS ${pageMapRoleLabel(access.role)}`, tone: '', title: access.role });
  if (access.editorType) chips.push({ text: `TYPE ${String(access.editorType).toUpperCase()}`, tone: '', title: access.editorType });
  if (access.metaError) chips.push({ text: 'META LIMITED', tone: 'warn', title: access.metaError });
  if (!chips.length) chips.push({ text: 'ACCESS UNKNOWN · REFRESH TO LOAD', tone: 'warn', title: 'No access metadata in this cached page map yet.' });

  return `<div class="page-map-access"><span class="page-map-user-label">ACCESS</span>${
    chips.map(chip => `<span class="page-map-access-chip ${chip.tone}" title="${escAttr(chip.title || chip.text)}">${esc(chip.text)}</span>`).join('')
  }</div>`;

function pageMapKnownPeopleHtml(file) {
  const people = pageMapKnownPeople(file);
  const chips = people.length
    ? people.slice(0, 6).map(person => {
        const role = person.roles.slice(0, 2).join(' / ');
        const suffix = role ? ` · ${role}` : '';
        const title = [person.name, person.email, ...person.roles].filter(Boolean).join(' · ');
        return `<span class="page-map-user-chip ${person.roles.some(r => r.includes('YOU') || r === 'CREATOR') ? 'primary' : ''}" title="${escAttr(title)}">${esc(person.name + suffix)}</span>`;
      }).join('') + (people.length > 6 ? `<span class="page-map-user-chip muted">+${people.length - 6}</span>` : '')
    : '<span class="page-map-user-chip muted">NO PEOPLE FROM API</span>';
  return `<div class="page-map-users"><span class="page-map-user-label">KNOWN PEOPLE</span>${chips}<span class="page-map-user-chip muted" title="Figma public REST API does not expose the full current owner/editor/viewer roster for a file.">FULL ROSTER NOT IN API</span></div>`;
}

function isPageMapMetaScopeError(message) {
  return /TOKEN INVALID|NO ACCESS|FORBIDDEN|403|SCOPE/i.test(message || '');
}

function collectPageMapVersions() {
  const byKey = new Map();
  const ingest = version => {
    if (!version?.fileKey || !version.id) return;
    const key = `${version.fileKey}::${version.id}`;
    const createdAt = version.createdAt instanceof Date ? version.createdAt : new Date(version.createdAt || version.created_at || 0);
    byKey.set(key, { ...version, createdAt });
  };

  getPageMapProjects().forEach(project => {
    const projectId = project.id;
    const cached = loadCache(projectId);
    (cached?.versions || []).forEach(ingest);
  });
  allVersions.forEach(ingest);

  return [...byKey.values()];
}

function hydratePageMapUsers(data = pageMapData) {
  if (!data?.length) return data;

  const versions = collectPageMapVersions();
  const versionsByFile = new Map();
  const versionsByFileAndId = new Map();

  versions.forEach(version => {
    if (!versionsByFile.has(version.fileKey)) versionsByFile.set(version.fileKey, []);
    versionsByFile.get(version.fileKey).push(version);
    versionsByFileAndId.set(`${version.fileKey}::${version.id}`, version);
  });

  data.forEach(project => {
    project.files.forEach(file => {
      const fileVersions = versionsByFile.get(file.key) || [];
      fileVersions.sort((a, b) => b.createdAt - a.createdAt);

      const fileUsers = new Map();
      fileVersions.forEach(version => addPageMapUser(fileUsers, version.user, version.createdAt));
      file.users = pageMapUserStats(fileUsers);
      file.lastUser = fileVersions[0]?.user || '';

      const pageUsersById = new Map();
      const analyzedVersions = pageAnalysisByFile[file.key]?.versions || {};
      Object.entries(analyzedVersions).forEach(([versionId, result]) => {
        const version = versionsByFileAndId.get(`${file.key}::${versionId}`);
        if (!version?.user) return;
        (result.pages || []).forEach(page => {
          if (!page?.id || page.changeType === 'removed') return;
          if (!pageUsersById.has(page.id)) pageUsersById.set(page.id, new Map());
          addPageMapUser(pageUsersById.get(page.id), version.user, version.createdAt);
        });
      });

      const hasAnalysis = !!Object.keys(analyzedVersions).length;
      file.pages.forEach(page => {
        page.users = pageMapUserStats(pageUsersById.get(page.id) || new Map());
        page.userSource = page.users.length ? 'inferred' : (hasAnalysis ? 'no-change-detected' : 'not-analyzed');
      });
    });
  });

  return data;
}

function pageMapUsersHtml(users, label, emptyText) {
  const list = users || [];
  const chips = list.length
    ? list.slice(0, 4).map((user, index) =>
        `<span class="page-map-user-chip ${index === 0 ? 'primary' : ''}" title="${escAttr(user.name)}">${esc(user.name)}${user.count > 1 ? ` (${user.count})` : ''}</span>`
      ).join('') + (list.length > 4 ? `<span class="page-map-user-chip muted">+${list.length - 4}</span>` : '')
    : `<span class="page-map-user-chip muted">${esc(emptyText)}</span>`;

  return `<div class="page-map-users"><span class="page-map-user-label">${esc(label)}</span>${chips}</div>`;
}

function pageMapFilterData(data, query) {
  const q = normalizeSearchText(query).trim();
  if (!q) return data;

  return (data || []).map(project => {
    const projectMatches = normalizeSearchText(`${project.name} ${project.id}`).includes(q);
    const files = project.files.map(file => {
      const fileMatches = normalizeSearchText(`${file.name} ${file.key} ${pageMapAccessSearchText(file)}`).includes(q);
      const fileUserMatches = normalizeSearchText(`${pageMapUserText(file.users)} ${pageMapFilePeopleSearchText(file)}`).includes(q);
      const pages = file.pages.filter(page => {
        if (projectMatches || fileMatches) return true;
        const pageText = `${page.name} ${page.id} ${pageMapUserText(page.users)} ${page.userSource || ''}`;
        return normalizeSearchText(pageText).includes(q);
      });
      if (projectMatches || fileMatches || pages.length) return { ...file, pages };
      return fileUserMatches ? { ...file, pages: file.pages } : null;
    }).filter(Boolean);
    return (projectMatches || files.length) ? { ...project, files } : null;
  }).filter(Boolean);
}

function pageMapProjectTotals(project) {
  const files = project?.files || [];
  const pages = files.reduce((sum, file) => sum + (file.pages || []).length, 0);
  return { files: files.length, pages };
}

function ensureSelectedPageMapProject(data) {
  const projects = data || [];
  if (!projects.length) {
    selectedPageMapProjectId = '';
    return null;
  }
  const selected = projects.find(project => project.id === selectedPageMapProjectId);
  if (selected) return selected;
  selectedPageMapProjectId = projects[0].id;
  return projects[0];
}

function selectPageMapProject(projectId) {
  selectedPageMapProjectId = projectId || '';
  renderPageMap();
  const contentWrap = document.getElementById('pageMapContentWrap');
  if (contentWrap) contentWrap.scrollTop = 0;
}

function setPageMapStatus(text, tone) {
  const el = document.getElementById('pageMapStatus');
  if (!el) return;
  el.textContent = text || '';
  el.className = 'page-analysis-status' + (tone ? ' ' + tone : '');
}

function pageMapTotals(data) {
  const projects = data || [];
  const files = projects.reduce((sum, project) => sum + project.files.length, 0);
  const pages = projects.reduce(
    (sum, project) => sum + project.files.reduce((fileSum, file) => fileSum + file.pages.length, 0),
    0
  );
  return { projects: projects.length, files, pages };
}

function renderPageMap(data = pageMapData, failures = pageMapFailures) {
  const nav = document.getElementById('pageMapNav');
  const content = document.getElementById('pageMapContent');
  const summary = document.getElementById('pageMapSummary');
  if (!nav || !content || !summary) return;

  hydratePageMapUsers(data);
  const projects = data || [];
  const searchQuery = pageMapSearchQuery.trim();
  const isSearchMode = !!searchQuery;
  const filteredProjects = isSearchMode ? pageMapFilterData(projects, searchQuery) : [];
  const selectedProject = isSearchMode ? null : ensureSelectedPageMapProject(projects);
  const selectedProjectIndex = Math.max(0, projects.findIndex(project => project.id === selectedProject?.id));

  if (!projects.length) {
    nav.innerHTML = '';
    summary.textContent = 'PROJECTS';
    setPageMapStatus(failures.length ? `[${failures.length} WARNING(S)]` : '', failures.length ? 'err' : '');
    content.innerHTML = failures.length
      ? failures.map(item => `<div class="page-map-warning">${esc(item.scope)} · ${esc(item.message)}</div>`).join('')
      : '<div class="page-map-empty">NO PAGE MAP LOADED</div>';
    return;
  }

  const visibleProjects = isSearchMode
    ? filteredProjects
    : (selectedProject ? [selectedProject] : []);
  const totals = isSearchMode
    ? pageMapTotals(visibleProjects)
    : pageMapProjectTotals(selectedProject);
  const cacheLabel = pageMapCachedAt ? ` · CACHED ${pageMapCacheAge(pageMapCachedAt)}` : '';
  summary.textContent = isSearchMode
    ? `SEARCH "${searchQuery}" · ${totals.projects} PROJECTS · ${totals.files} FILES · ${totals.pages} PAGES`
    : `${selectedProject ? selectedProject.name + ' · ' : ''}${totals.files} FILES · ${totals.pages} PAGES`;
  setPageMapStatus(
    failures.length
      ? `[${failures.length} WARNING(S)${cacheLabel}]`
      : (isSearchMode ? `[ORGANIZATION RESULTS${cacheLabel}]` : `[SELECTED PROJECT${cacheLabel}]`),
    failures.length ? 'warn' : 'ok'
  );

  let navHtml = '';
  let contentHtml = '';

  if (isSearchMode && !visibleProjects.length) {
    nav.innerHTML = '';
    content.innerHTML = `<div class="page-map-empty">NO MATCHES IN ORGANIZATION FOR "${esc(searchQuery)}"</div>`;
    return;
  }

  const renderFile = (project, projectIndex, file, fileIndex) => {
    const fileId = pageMapAnchor('file', projectIndex, fileIndex);
    let html = `<div class="page-map-file" id="${fileId}">
      <div class="page-map-file-head">
        <h4>${esc(file.name)}</h4>
        <a class="file-link" href="${escAttr(figmaWebUrl(file.key))}" onclick="event.preventDefault();openInFigma(${jsArg(file.key)})">OPEN FILE &rarr;</a>
      </div>
      <div class="page-map-node">${esc(file.key)}</div>
      ${pageMapAccessHtml(file)}
      ${pageMapKnownPeopleHtml(file)}
      ${pageMapUsersHtml(file.users, file.lastUser ? `LAST ${file.lastUser} · USERS` : 'USERS', 'NO VERSION CACHE')}`;

    if (file.error) {
      html += `<div class="page-map-warning">${esc(file.error)}</div>`;
    } else if (!file.pages.length) {
      html += '<div class="page-map-empty">NO PAGES</div>';
    } else {
      html += '<div class="page-map-page-list">';
      file.pages.forEach((page, pageIndex) => {
        const pageId = pageMapAnchor('page', projectIndex, fileIndex, pageIndex);
        const emptyUserText = page.userSource === 'not-analyzed'
          ? 'NOT ANALYZED'
          : (page.userSource === 'no-change-detected' ? 'NO PAGE TOUCH' : 'NO USER');
        html += `<div class="page-map-page" id="${pageId}">
          <div class="page-map-page-main">
            <a href="${escAttr(figmaWebUrl(file.key, page.id))}" onclick="event.preventDefault();openInFigma(${jsArg(file.key)}, ${jsArg(page.id)})">${esc(page.name)}</a>
            ${pageMapUsersHtml(page.users, 'INFERRED USERS', emptyUserText)}
          </div>
          <span class="page-map-node">${esc(page.id)}</span>
        </div>`;
      });
      html += '</div>';
    }

    html += '</div>';
    return html;
  };

  if (isSearchMode) {
    visibleProjects.forEach((project, projectIndex) => {
      const projectTotals = pageMapProjectTotals(project);
      const projectId = pageMapAnchor('project', projectIndex);
      navHtml += `<button class="page-map-nav-project" onclick="scrollPageMapTo('${projectId}')">${esc(project.name)}<span class="page-map-count">${projectTotals.files}/${projectTotals.pages}</span></button>`;

      contentHtml += `<section class="page-map-project" id="${projectId}">
        <div class="page-map-project-head">
          <h3>${esc(project.name)}</h3>
          <span class="page-map-count">${esc(project.id)} · ${projectTotals.files} FILES · ${projectTotals.pages} PAGES</span>
        </div>`;

      if (!project.files.length) {
        contentHtml += '<div class="page-map-empty">NO FILES</div>';
      } else {
        project.files.forEach((file, fileIndex) => {
          contentHtml += renderFile(project, projectIndex, file, fileIndex);
        });
      }

      contentHtml += '</section>';
    });
  } else {
    projects.forEach((project, projectIndex) => {
    const projectTotals = pageMapProjectTotals(project);
    const isSelected = project.id === selectedPageMapProjectId;
    navHtml += `<button class="page-map-nav-project ${isSelected ? 'active' : ''}" onclick="selectPageMapProject(${jsArg(project.id)})">${esc(project.name)}<span class="page-map-count">${projectTotals.files}/${projectTotals.pages}</span></button>`;

    if (!isSelected) return;
      (selectedProject.files || []).forEach((file, fileIndex) => {
      const fileId = pageMapAnchor('file', projectIndex, fileIndex);
      navHtml += `<button class="page-map-nav-file" onclick="scrollPageMapTo('${fileId}')">${esc(file.name)}<span class="page-map-count">${file.pages.length}</span></button>`;
    });
  });

  const projectId = pageMapAnchor('project', selectedProjectIndex);
  const selectedTotals = pageMapProjectTotals(selectedProject);
  contentHtml += `<section class="page-map-project" id="${projectId}">
    <div class="page-map-project-head">
      <h3>${esc(selectedProject.name)}</h3>
      <span class="page-map-count">${esc(selectedProject.id)} · ${selectedTotals.files} FILES · ${selectedTotals.pages} PAGES</span>
    </div>`;

    if (!selectedProject.files.length) {
    contentHtml += '<div class="page-map-empty">NO FILES</div>';
  } else {
      selectedProject.files.forEach((file, fileIndex) => {
        contentHtml += renderFile(selectedProject, selectedProjectIndex, file, fileIndex);
    });
  }

  contentHtml += '</section>';
  }

  if (failures.length) {
    contentHtml += '<section class="page-map-project"><div class="page-map-project-head"><h3>Warnings</h3></div>';
    failures.forEach(item => {
      contentHtml += `<div class="page-map-warning">${esc(item.scope)} · ${esc(item.message)}</div>`;
    });
    contentHtml += '</section>';
  }

  nav.innerHTML = navHtml;
  content.innerHTML = contentHtml;
}

async function loadPageMap(force) {
  const token = getToken();
  const button = document.getElementById('pageMapRefresh');
  const pageMapProjects = getPageMapProjects();
  const results = [];
  const failures = [];
  const delay = ms => new Promise(r => setTimeout(r, ms));
  let currentUser = null;
  let fileMetaDisabledMessage = '';

  if (!token) {
    setPageMapStatus('[NO TOKEN]', 'err');
    renderPageMapTokenEmptyState();
    return;
  }

  if (!force && pageMapData) {
    renderPageMap();
    return;
  }

  if (button) button.disabled = true;
  renderPageMapEmpty('LOADING PAGE MAP');
  setPageMapStatus('[LOADING]', 'warn');

  try {
    try {
      currentUser = normalizePageMapPerson(await figmaGet('/me', token));
      if (currentUser?.avatar) {
        ingestUserFromVersion({ id: currentUser.id, handle: currentUser.name, img_url: currentUser.avatar });
      }
    } catch (e) {
      currentUser = null;
    }

    for (let i = 0; i < pageMapProjects.length; i++) {
      const pageMapProject = pageMapProjects[i];
      const projectId = pageMapProject.id;
      setPageMapStatus(`[PROJECT ${i + 1} / ${pageMapProjects.length} · ${projectId}]`, 'warn');

      let projData;
      try {
        projData = await figmaGet(`/projects/${projectId}/files`, token);
      } catch (e) {
        failures.push({ scope: `Project ${projectId}`, message: e.message || String(e) });
        continue;
      }

      const files = projData.files || [];
      const project = {
        id: projectId,
        name: projData.name || pageMapProject.name || `Project ${projectId}`,
        files: [],
      };

      for (let j = 0; j < files.length; j++) {
        const file = files[j];
        setPageMapStatus(`[${project.name} · FILE ${j + 1} / ${files.length}]`, 'warn');

        try {
          const fileData = await figmaGet(`/files/${file.key}?depth=1`, token);
          let metaFile = null;
          let metaError = '';
          if (!fileMetaDisabledMessage) {
            try {
              const metaData = await figmaGet(`/files/${file.key}/meta`, token);
              metaFile = metaData.file || null;
              [metaFile?.creator, metaFile?.last_touched_by].forEach(ingestUserFromVersion);
            } catch (e) {
              metaError = e.message || String(e);
              if (isPageMapMetaScopeError(metaError)) fileMetaDisabledMessage = metaError;
            }
          } else {
            metaError = fileMetaDisabledMessage;
          }

          const access = pageMapAccessFromResponses(fileData, metaFile, metaError);
          const pages = (fileData.document?.children || [])
            .filter(node => node.type === 'CANVAS')
            .map(node => ({ id: node.id, name: node.name || 'Untitled Page' }));
          project.files.push({
            key: file.key,
            name: file.name || fileData.name || metaFile?.name || file.key,
            pages,
            access,
            creator: normalizePageMapPerson(metaFile?.creator),
            lastTouchedBy: normalizePageMapPerson(metaFile?.last_touched_by),
            currentUser: currentUser ? { ...currentUser } : null,
          });
        } catch (e) {
          const message = e.message || String(e);
          failures.push({ scope: `File ${file.name || file.key}`, message });
          project.files.push({ key: file.key, name: file.name || file.key, pages: [], error: message });
        }

        if (j < files.length - 1) await delay(120);
      }

      results.push(project);
      pageMapData = results.slice();
      pageMapFailures = failures.slice();
      savePageMapCache();
      renderPageMap(pageMapData, pageMapFailures);
      if (i < pageMapProjects.length - 1) await delay(180);
    }

    if (results.length) {
      pageMapData = results;
      pageMapFailures = failures;
      savePageMapCache();
      renderPageMap(pageMapData, pageMapFailures);
    } else {
      pageMapFailures = failures;
      renderPageMap(pageMapData, pageMapFailures);
    }
  } finally {
    if (button) button.disabled = false;
  }
}

function loadAllProjectsCache(metaText) {
  const projects = getSavedProjects();
  if (!projects.length) {
    if (!getToken()) renderChangelogTokenEmptyState();
    return;
  }

  allVersions = [];
  allFiles = [];
  let maxDays = 0;

  projects.forEach(p => {
    const cached = loadCache(p.id);
    if (!cached) return;
    cached.versions.forEach(v => { v.projectName = p.name; });
    allVersions.push(...cached.versions);
    cached.files.forEach(f => mergeFileEntry(f));
    if (cached.days > maxDays) maxDays = cached.days;
  });

  if (!allVersions.length && !allFiles.length) {
    if (!getToken()) renderChangelogTokenEmptyState();
    return;
  }

  allVersions.sort((a, b) => b.createdAt - a.createdAt);
  syncFileNamesFromVersions();
  activeFileFilter = null;
  activeUserFilter = null;
  computeSessionDurations();
  showSections();
  renderStats(allFiles, maxDays || 30);
  renderFilters();
  renderUserFilters();
  renderUserStats();
  renderTimeline();
  setHeaderMeta(metaText || `ALL PROJECTS / CACHED`);
  hydrateAvatars(document.querySelector('.page'));
  resolveAvatars(maxDays || 30);
}

async function autoFetchSavedProjects() {
  const projects = getSavedProjects();
  const token = getToken();
  const days = getDays();
  const fetchBtn = document.getElementById('fetchBtn');

  if (!projects.length || !token) return;
  if (autoFetchInFlight || fetchBtn.disabled) return;

  const failures = [];
  autoFetchInFlight = true;
  fetchBtn.disabled = true;
  hideError();

  try {
    for (let i = 0; i < projects.length; i++) {
      const project = projects[i];
      const projectLabel = project.name || 'PROJECT ' + project.id;
      const statusLabel = projectLabel.length > 42 ? projectLabel.slice(0, 39) + '...' : projectLabel;

      try {
        const data = await fetchProjectChangelogData(project.id, token, days, progress => {
          const prefix = `AUTO FETCHING ${i + 1} / ${projects.length} · ${statusLabel}`;
          if (progress.phase === 'files') {
            setStatus(`${prefix} · FILES`, true);
          } else {
            setStatus(`${prefix} · VERSIONS ${progress.completed} / ${progress.total}`, true);
          }
        });

        saveProjectCache(project.id, days, data.versions, data.files);
        updateSavedProjectName(project.id, data.rawProjectName);
      } catch (e) {
        failures.push({ project, error: e });
        console.warn('Auto fetch failed for project', project.id, e);
      }
    }

    saveLiveAvatarUrls();

    if (selectedProjectId === null) {
      loadAllProjectsCache(failures.length ? 'ALL PROJECTS / UPDATED PARTIAL' : 'ALL PROJECTS / UPDATED NOW');
    }

    if (failures.length) {
      const failedAll = failures.length === projects.length;
      showError(failedAll
        ? `[AUTO FETCH FAILED: ${failures.length} PROJECT(S)]`
        : `[AUTO FETCH PARTIAL: ${failures.length} PROJECT(S) FAILED]`);
    }
  } finally {
    hideStatus();
    fetchBtn.disabled = false;
    autoFetchInFlight = false;
  }
}

function startAutoFetchLoop() {
  autoFetchSavedProjects();
  if (autoFetchTimerId) clearInterval(autoFetchTimerId);
  autoFetchTimerId = setInterval(autoFetchSavedProjects, AUTO_FETCH_INTERVAL_MS);
}

loadLiveAvatarUrls();
loadPageAnalysisCache();
loadPageMapCache();
updateTokenStatus();
renderProjectList();
